<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mirabaud HC | Data Diagnostic Tool</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [files, setFiles] = useState({ stocks: null, quant: null, qual: null });
            const [logs, setLogs] = useState(["System Ready. Waiting for 3 CSV files..."]);
            const [merged, setMerged] = useState([]);

            const addLog = (msg) => setLogs(prev => [msg, ...prev].slice(0, 5));

            const handleFile = (type, e) => {
                const file = e.target.files[0];
                if (!file) return;

                addLog(`Reading ${file.name}...`);
                
                const reader = new FileReader();
                reader.onload = (f) => {
                    try {
                        const text = f.target.result;
                        // Handle both comma (,) and semicolon (;) separators common in European Excel
                        const lines = text.split(/\r?\n/).filter(l => l.trim());
                        if (lines.length < 2) throw new Error("File appears empty.");

                        const separator = lines[0].includes(';') ? ';' : ',';
                        const headers = lines[0].split(separator).map(h => h.trim().toLowerCase());
                        
                        const data = lines.slice(1).map(line => {
                            const cols = line.split(separator);
                            return headers.reduce((acc, h, i) => {
                                acc[h] = cols[i]?.trim();
                                return acc;
                            }, {});
                        });

                        setFiles(prev => ({ ...prev, [type]: data }));
                        addLog(`✅ Successfully loaded ${data.length} rows for ${type}.`);
                    } catch (err) {
                        addLog(`❌ Error: ${err.message}`);
                    }
                };
                reader.onerror = () => addLog("❌ Failed to read file.");
                reader.readAsText(file);
            };

            return (
                <div className="max-w-5xl mx-auto p-10">
                    <header className="mb-10 text-center">
                        <h1 className="text-3xl font-black text-white tracking-widest uppercase">Mirabaud Fusion Engine</h1>
                        <p className="text-slate-500 text-xs mt-2">v2026.03 | Internal Research Tool</p>
                    </header>

                    {/* Step 1: Upload Zones */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                        <UploadCard id="stocks" label="1. Stock Universe" active={!!files.stocks} onUpload={handleFile} />
                        <UploadCard id="quant" label="2. Quant Rankings" active={!!files.quant} onUpload={handleFile} />
                        <UploadCard id="qual" label="3. Qual Rankings" active={!!files.qual} onUpload={handleFile} />
                    </div>

                    {/* Step 2: Diagnostic Logs */}
                    <div className="bg-black/40 border border-slate-700 p-4 rounded-lg mb-6 font-mono text-[10px] text-blue-400">
                        <p className="text-slate-500 mb-2 uppercase border-b border-slate-800 pb-1">Diagnostic Console</p>
                        {logs.map((log, i) => <div key={i} className="py-0.5 tracking-tighter">{log}</div>)}
                    </div>

                    {/* Step 3: Result View */}
                    {files.stocks && files.quant && files.qual && (
                        <div className="bg-white text-slate-900 p-6 rounded-xl shadow-2xl animate-bounce-short">
                            <h2 className="font-bold mb-4 text-center">Files Ready for Fusion!</h2>
                            <button className="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700">
                                PROCESS & MERGE DATA
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        const UploadCard = ({ id, label, active, onUpload }) => (
            <div className={`p-6 border-2 rounded-2xl transition-all ${active ? 'bg-green-500/20 border-green-500 text-green-400' : 'bg-slate-800 border-slate-700 border-dashed text-slate-400'}`}>
                <p className="text-[10px] font-bold mb-3 uppercase tracking-widest">{label}</p>
                <input 
                    type="file" 
                    onChange={(e) => onUpload(id, e)} 
                    className="block w-full text-[10px] file:bg-blue-600 file:text-white file:border-0 file:rounded file:px-3 file:py-1 cursor-pointer"
                />
                {active && <p className="mt-2 text-[10px] font-bold">READY</p>}
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
