<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirabaud HC | Investment Universe</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d0d0d;--paper:#f5f2ec;--cream:#ede9e0;--accent:#c8a84b;
  --accent-dark:#9a7a28;--muted:#777;--red:#c0392b;--green:#1e7e4a;
  --blue:#1a6a9a;--border:#d8d2c4;--white:#fff;
  --tier-hc:#7c3aed;--tier-buy:#1e7e4a;--tier-hold:#1a6a9a;--tier-watch:#777;
}
html,body{height:100%;background:var(--paper);color:var(--ink);font-family:monospace;font-size:13px}
#app{display:flex;flex-direction:column;height:100vh}
.main{flex:1;overflow-y:auto;position:relative}
 
/* ── HEADER ── */
.header{background:var(--ink);color:var(--paper);padding:0 28px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:2px solid var(--accent)}
.brand{font-size:15px;font-weight:700;letter-spacing:.05em}
.brand span{font-size:9px;font-weight:400;letter-spacing:.25em;text-transform:uppercase;color:var(--accent);margin-left:10px}
.nav{display:flex;gap:24px;align-items:center}
.nav button{font-family:inherit;font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;background:none;border:none;color:#666;cursor:pointer;padding:4px 0;border-bottom:2px solid transparent;transition:all .15s}
.nav button.active,.nav button:hover{color:var(--accent);border-bottom-color:var(--accent)}
 
/* ── UPLOAD ── */
.upload-wrap{max-width:860px;margin:48px auto;padding:0 24px}
.upload-title{font-size:28px;font-weight:700;margin-bottom:6px;letter-spacing:-.02em}
.upload-sub{font-size:9px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px}
.upload-legend{display:flex;gap:16px;margin-bottom:32px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.legend-dot{width:8px;height:8px;border-radius:50%}
.upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}
.ucard{border:1px solid var(--border);padding:20px;background:var(--white);transition:border-color .2s;position:relative}
.ucard.loaded{border-color:var(--accent);background:#fdf9ef}
.ucard.required::after{content:'REQUIS';position:absolute;top:12px;right:12px;font-size:7px;font-weight:700;letter-spacing:.15em;color:var(--muted)}
.ucard.loaded::after{content:'✓ OK';color:var(--green)}
.ctag{font-size:8px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.ctitle{font-size:14px;font-weight:700;margin-bottom:3px}
.crole{font-size:10px;color:var(--accent-dark);font-weight:700;margin-bottom:6px}
.cdesc{font-size:10px;color:var(--muted);line-height:1.6;margin-bottom:14px}
.cstatus{font-size:9px;font-weight:700;margin-bottom:10px}
.ok{color:var(--green)}.pend{color:var(--muted)}
.flabel{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;border:1px solid var(--ink);padding:6px 12px;cursor:pointer;transition:all .15s}
.flabel:hover{background:var(--ink);color:var(--paper)}
input[type=file]{display:none}
.upload-actions{display:flex;align-items:center;gap:16px}
.run-btn{font-family:inherit;font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;background:var(--ink);color:var(--paper);border:none;padding:13px 28px;cursor:pointer;transition:background .15s}
.run-btn:hover{background:var(--accent-dark)}
.run-btn:disabled{opacity:.3;cursor:not-allowed}
.upload-note{font-size:9px;color:var(--muted);line-height:1.7;margin-top:16px}
 
/* ── VALIDATION REPORT ── */
.val-report{background:var(--white);border:1px solid var(--border);padding:16px 20px;margin-top:16px;display:none}
.val-report.show{display:block}
.val-title{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;margin-bottom:10px}
.val-row{display:flex;justify-content:space-between;font-size:10px;padding:4px 0;border-bottom:1px solid var(--cream)}
.val-row:last-child{border-bottom:none}
.val-key{color:var(--muted);font-weight:700}
.val-ok{color:var(--green);font-weight:700}
.val-warn{color:var(--accent-dark);font-weight:700}
.val-err{color:var(--red);font-weight:700}
 
/* ── TIER BADGES ── */
.tier{display:inline-block;font-size:8px;font-weight:700;padding:2px 7px;border-radius:2px;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.tier-hc{background:#ede9ff;color:var(--tier-hc)}
.tier-buy{background:#d4edda;color:var(--tier-buy)}
.tier-hold{background:#d0e8f5;color:var(--tier-hold)}
.tier-watch{background:var(--cream);color:var(--tier-watch)}
.tier-none{background:var(--cream);color:var(--muted)}
 
/* ── MACRO ── */
.macro-wrap{padding:20px 28px;transition:margin-right .25s}
.macro-wrap.shifted{margin-right:430px}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
.kpi{background:var(--white);border:1px solid var(--border);padding:14px 16px;cursor:pointer;transition:border-color .15s,box-shadow .15s;position:relative}
.kpi:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(200,168,75,.15)}
.kpi.active{border-color:var(--accent);border-bottom:3px solid var(--accent)}
.kpi-lbl{font-size:8px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.kpi-val{font-size:22px;font-weight:700;line-height:1}
.kpi-sub{font-size:9px;color:var(--muted);margin-top:3px}
.kpi-hint{position:absolute;top:8px;right:8px;font-size:9px;color:var(--border)}
.kpi:hover .kpi-hint{color:var(--accent)}
.kvg{color:var(--green)}.kvr{color:var(--red)}.kvo{color:var(--accent-dark)}.kvb{color:var(--blue)}.kvp{color:var(--tier-hc)}
.tier-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.tier-kpi{background:var(--white);border:1px solid var(--border);padding:12px 16px;cursor:pointer;transition:all .15s;border-left:4px solid transparent}
.tier-kpi:hover,.tier-kpi.active{box-shadow:0 2px 8px rgba(0,0,0,.08)}
.tier-kpi.t-hc{border-left-color:var(--tier-hc)}.tier-kpi.t-hc:hover,.tier-kpi.t-hc.active{background:#faf8ff}
.tier-kpi.t-buy{border-left-color:var(--tier-buy)}.tier-kpi.t-buy:hover,.tier-kpi.t-buy.active{background:#f0faf4}
.tier-kpi.t-hold{border-left-color:var(--tier-hold)}.tier-kpi.t-hold:hover,.tier-kpi.t-hold.active{background:#f0f7fd}
.tier-kpi.t-watch{border-left-color:var(--muted)}.tier-kpi.t-watch:hover,.tier-kpi.t-watch.active{background:var(--cream)}
.tier-kpi-lbl{font-size:8px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.tier-kpi-val{font-size:20px;font-weight:700}
.tier-kpi-sub{font-size:9px;color:var(--muted);margin-top:2px}
 
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.panel{background:var(--white);border:1px solid var(--border)}
.ph{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--cream);display:flex;justify-content:space-between;align-items:center}
.pht{font-size:8px;font-weight:700;letter-spacing:.2em;text-transform:uppercase}
.phh{font-size:8px;color:var(--muted)}
.pb{padding:12px 16px}
.brow{display:flex;align-items:center;gap:8px;margin-bottom:7px;cursor:pointer;padding:3px 4px;border-radius:2px;transition:background .1s}
.brow:last-child{margin-bottom:0}
.brow:hover,.brow.active{background:var(--cream)}
.brow.active{outline:1px solid var(--accent)}
.bname{font-size:10px;font-weight:700;width:130px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btrack{flex:1;height:5px;background:var(--cream);overflow:hidden}
.bfill{height:100%;transition:width .4s}
.bf0{background:var(--ink)}.bf1{background:var(--green)}.bf2{background:var(--red)}.bf3{background:var(--accent)}.bf4{background:var(--blue)}.bf5{background:var(--tier-hc)}
.bmeta{font-size:9px;color:var(--muted);width:40px;text-align:right;flex-shrink:0}
.bmeta2{font-size:9px;font-weight:700;width:60px;text-align:right;flex-shrink:0}
.rrow{display:flex;justify-content:space-between;align-items:center;padding:7px 6px;border-bottom:1px solid var(--cream);cursor:pointer;transition:background .1s;border-radius:2px}
.rrow:last-child{border-bottom:none}
.rrow:hover,.rrow.active{background:var(--cream)}
.rrow.active{outline:1px solid var(--accent)}
.rname{font-size:11px;font-weight:700}
.rdet{font-size:9px;color:var(--muted)}
.rup{font-size:11px;font-weight:700}
.rpos{color:var(--green)}.rneg{color:var(--red)}
.qscores{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.qscore-item{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;background:var(--cream);border-radius:2px}
.qscore-lbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
.qscore-val{font-size:10px;font-weight:700}
 
/* ── SCORE DOTS ── */
.sdot{display:inline-block;width:10px;height:10px;border-radius:2px;vertical-align:middle}
.sdot1{background:#1e7e4a}.sdot2{background:#1a6a9a}.sdot3{background:#856404}.sdot4{background:#c0392b}.sdot0{background:var(--border)}
.dots-row{display:flex;gap:2px;margin-top:3px}
 
/* ── DRILL PANEL ── */
.drill-panel{position:fixed;top:52px;right:0;bottom:0;width:420px;background:var(--white);border-left:2px solid var(--accent);display:flex;flex-direction:column;z-index:50;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
.drill-panel.open{transform:translateX(0)}
.dp-header{background:var(--ink);color:var(--paper);padding:14px 16px;flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between}
.dp-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.dp-subtitle{font-size:9px;color:var(--accent);margin-top:3px}
.dp-close{font-family:inherit;font-size:9px;font-weight:700;background:none;border:none;color:#888;cursor:pointer;transition:color .15s;padding:0 0 0 12px;flex-shrink:0}
.dp-close:hover{color:var(--accent)}
.dp-actions{padding:9px 14px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-shrink:0;background:var(--cream)}
.dp-action-btn{font-family:inherit;font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:var(--ink);color:var(--paper);border:none;padding:5px 10px;cursor:pointer}
.dp-action-btn:hover{background:var(--accent-dark)}
.dp-count{font-size:9px;color:var(--muted);margin-left:auto}
.dp-body{flex:1;overflow-y:auto}
.dp-table{width:100%;border-collapse:collapse}
.dp-table th{font-size:7px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);padding:6px 8px;border-bottom:2px solid var(--ink);position:sticky;top:0;background:var(--white);white-space:nowrap;text-align:left}
.dp-table th.r{text-align:right}
.dp-table td{padding:7px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
.dp-table tbody tr{cursor:pointer;transition:background .1s}
.dp-table tbody tr:hover{background:var(--cream)}
.dp-name{font-size:10px;font-weight:700}
.dp-isin{font-size:8px;color:var(--muted);margin-top:1px}
 
/* ── FILTER BAR ── */
.fbar{background:var(--white);border-bottom:1px solid var(--border);padding:9px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0;position:sticky;top:0;z-index:10}
.fl{font-size:8px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
select.fs{font-family:inherit;font-size:10px;font-weight:700;background:var(--cream);border:1px solid var(--border);padding:4px 7px;cursor:pointer;outline:none}
select.fs:focus{border-color:var(--ink)}
.chips{display:flex;gap:4px;flex-wrap:wrap}
.chip{font-family:inherit;font-size:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border:1px solid var(--border);cursor:pointer;background:var(--white);transition:all .12s;border-radius:20px}
.chip:hover{border-color:var(--ink)}
.chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.chip-hc.on{background:var(--tier-hc);border-color:var(--tier-hc);color:#fff}
.chip-buy.on{background:var(--tier-buy);border-color:var(--tier-buy);color:#fff}
.chip-hold.on{background:var(--tier-hold);border-color:var(--tier-hold);color:#fff}
.q1on{background:var(--green)!important;border-color:var(--green)!important;color:#fff!important}
.q2on{background:var(--blue)!important;border-color:var(--blue)!important;color:#fff!important}
.q3on{background:var(--accent-dark)!important;border-color:var(--accent-dark)!important;color:#fff!important}
.q4on{background:var(--red)!important;border-color:var(--red)!important;color:#fff!important}
.sep{width:1px;height:18px;background:var(--border);flex-shrink:0}
input.srch{font-family:inherit;font-size:10px;background:var(--cream);border:1px solid var(--border);padding:4px 10px;outline:none;width:170px}
input.srch:focus{border-color:var(--ink)}
.rcnt{font-size:9px;color:var(--muted);margin-left:auto;white-space:nowrap}
 
/* ── UNIVERSE TABLE ── */
.twrap{padding:0 28px 32px}
table.ut{width:100%;border-collapse:collapse;margin-top:12px;font-size:11px}
table.ut thead tr{border-bottom:2px solid var(--ink)}
table.ut th{font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:6px 8px;text-align:left;white-space:nowrap}
table.ut th.r{text-align:right}table.ut th.c{text-align:center}
table.ut tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
table.ut tbody tr:hover{background:var(--cream)}
table.ut td{padding:8px 8px;vertical-align:middle}
.tn{font-size:11px;font-weight:700}
.ti{font-size:9px;color:var(--muted);margin-top:1px}
.tsm{font-size:9px;color:var(--muted)}
.qb{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:2px;white-space:nowrap}
.q1{background:#d4edda;color:#1e7e4a}.q2{background:#d0e8f5;color:#1a6a9a}
.q3{background:#fef3cd;color:#856404}.q4{background:#f8d7da;color:#842029}.q0{background:var(--cream);color:var(--muted)}
.uv{font-size:11px;font-weight:700}
.uhi{color:var(--green)}.umed{color:var(--accent-dark)}.ulo{color:var(--muted)}.uneg{color:var(--red)}
.rb{font-size:8px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:2px}
.rhi{background:#f8d7da;color:#842029}.rme{background:#fef3cd;color:#856404}.rlo{background:#d4edda;color:#1e7e4a}
.fg{display:inline-block;font-size:7px;font-weight:700;padding:2px 4px;background:#f0ebff;color:#6d28d9;margin-right:2px;border-radius:2px;white-space:nowrap}
.fgr{background:#f8d7da;color:#842029}
th button.srt{font-family:inherit;font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;background:none;border:none;color:var(--muted);cursor:pointer;white-space:nowrap}
th button.srt.on{color:var(--ink)}
.coverage-badge{font-size:7px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:1px 5px;border-radius:2px;background:var(--cream);color:var(--muted)}
.cov-full{background:#ede9ff;color:var(--tier-hc)}
.cov-quant{background:#d0e8f5;color:var(--tier-hold)}
.cov-basic{background:var(--cream);color:var(--muted)}
 
/* ── STOCK MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(13,13,13,.65);z-index:200;display:flex;justify-content:flex-end}
.modal{width:600px;height:100%;background:var(--paper);overflow-y:auto;border-left:1px solid var(--border)}
.mhdr{background:var(--ink);color:var(--paper);padding:20px 24px;position:sticky;top:0;z-index:1}
.mclose{font-family:inherit;font-size:8px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;background:none;border:none;color:#666;cursor:pointer;margin-bottom:12px;display:block;transition:color .15s}
.mclose:hover{color:var(--accent)}
.mtag{font-size:8px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
.mname{font-size:22px;font-weight:700;line-height:1.15;margin-bottom:3px}
.misin{font-size:9px;color:#888;letter-spacing:.1em}
.mbody{padding:20px 24px}
.msec{margin-bottom:20px}
.mst{font-size:8px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.mmetrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.mmet{background:var(--white);border:1px solid var(--border);padding:10px 12px}
.mml{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.mmv{font-size:16px;font-weight:700}
.mmg{color:var(--green)}.mmr{color:var(--red)}.mmo{color:var(--accent-dark)}.mmb{color:var(--blue)}
.qr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--cream)}
.qr:last-child{border-bottom:none}
.qk{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.qv{font-size:10px;font-weight:700}
.quant-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:8px}
.qg-item{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;background:var(--white);border:1px solid var(--border)}
.qg-lbl{font-size:8px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.qual-score-row{display:flex;align-items:center;padding:5px 0;border-bottom:1px solid var(--cream)}
.qual-score-row:last-child{border-bottom:none}
.qual-score-lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;flex:1}
.qual-score-dots{display:flex;gap:3px;align-items:center}
.qual-dot{width:14px;height:14px;border-radius:2px;border:1px solid var(--border)}
.qdot-filled-1{background:#1e7e4a;border-color:#1e7e4a}.qdot-filled-2{background:#1a6a9a;border-color:#1a6a9a}
.qdot-filled-3{background:#856404;border-color:#856404}.qdot-filled-4{background:#c0392b;border-color:#c0392b}
.qual-score-num{font-size:9px;font-weight:700;margin-left:8px;width:14px;text-align:center}
.perf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.perf-item{background:var(--white);border:1px solid var(--border);padding:8px 10px;text-align:center}
.perf-lbl{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:3px}
.perf-val{font-size:14px;font-weight:700}
.fglg{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 9px;background:#f8d7da;color:#842029;margin-right:4px;margin-bottom:4px;border-radius:2px}
.fglg.w{background:#fef3cd;color:#856404}
.no-data{font-size:9px;color:var(--muted);font-style:italic;padding:8px 0}
.empty{text-align:center;padding:70px 20px;color:var(--muted)}
.eico{font-size:28px;margin-bottom:10px}
.emsg{font-size:9px;letter-spacing:.12em;text-transform:uppercase}
 
/* ── MOMENTUM PAGE ── */
.mom-wrap{padding:20px 28px}
.mom-controls{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.mom-score-bar{display:flex;gap:2px;align-items:center}
.mom-score-seg{height:6px;border-radius:1px;flex:1}
.score-ring{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;font-size:11px;font-weight:700;border:2px solid transparent;flex-shrink:0}
.score-s{background:#d4edda;color:#1e7e4a;border-color:#1e7e4a}
.score-a{background:#d0e8f5;color:#1a6a9a;border-color:#1a6a9a}
.score-b{background:#fef3cd;color:#856404;border-color:#856404}
.score-c{background:#ffe8d0;color:#9a4a1a;border-color:#c06030}
.score-d{background:#f8d7da;color:#842029;border-color:#c0392b}

<script>
// ════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════
var raw = { all: null, universe: null, quant: null, qual: null };
var universe = []; // merged records
var sortState = { field: 'upside', dir: 'desc' };
var filters = { search: '', region: 'All', sector: 'All', tiers: [], quants: [], risk: 'All', divMin: 0 };
 
// ── PERSISTENCE ──────────────────────────────────────
var STORAGE_KEYS = { all: 'mhc_raw_all', universe: 'mhc_raw_universe', quant: 'mhc_raw_quant', qual: 'mhc_raw_qual' };
var STORAGE_META = 'mhc_raw_meta';
 
// Columns we actually use — prune everything else before saving
var COLS_KEEP = {
  all: ['securities','id_isin','isin','ticker','name','long_comp_name','security_des',
        'gics_sector_name','gics_industry_name','cntry_of_domicile','country_full_name',
        'region_or_country','country_iso','bb_country_code','parent_comp_country_iso',
        'crncy','cur_mkt_cap','current_market_cap_eod',
        'px_last','px_last_eod','px_close_1d','high_52week','low_52week',
        'eqy_dvd_yld_12m','eqy_dvd_yld','chg_pct_1d','px_dt_1d','px_dt_1m',
        'px_dt_3m','px_dt_6m','px_dt_1yr','px_dt_1y','pe_ratio_eod'],
  universe: ['id_isin','isin','ticker','company name','company','name',
             'sector name','sector','gics_sector_name','region','geography',
             'rating cfra','rating','rating override',
             'pt cfra','pt override','price target (1)','price target','target price',
             'upside downside','upside/downside','upside',
             'forward pe','forward p/e','fwd pe',
             'ytd return','ytd','ytd relative*','ytd relative',
             'expected growth yoy','expected growth',
             'dividend yield','div yield',
             'core satellite','core/satellite','esg leader','esg leader**','crncy','currency',
             'market\n cap','market cap'],
  quant: ['id_isin','isin','name','country_full_name','gics_sector_name','industry',
          'combined quartile','vl value creation quartile','earnings revisions quartile',
          'quality quartile','profitability quartile','growth quartile',
          'bs & cf quartile','valuation quartile','sentiment quartile',
          'stop loss signal','stop loss',
          'short term technical          %bollinger [30d]','short term technical','bollinger',
          'volatililty 180 d','volatility 180 d','beta_down','beta up',
          'relative performance1w','relative performance 1w','relative performance 1 month',
          'relative performance 3 month','relative performance 6 month','relative performance 1 year',
          'distance to 52w high','distance to 52w low','52w high','52w low',
          'return on equity','roe lf','return on assets','roa lf',
          'operating margin','opm lf','profit margin',
          'net debt / ebitda','fcf yield','ev / ebitda',
          'market cap (usd bn)','analyst target price','pe','best pe','p/book','best p/b'],
  qual: ['id_isin','isin','region','name',
         'moat','management quality','scalability and expansion potential',
         'r&d budget','customer base & loyalty','adaptability to disruption',
         'regulatory environment','brand & reputation']
};
 
function pruneRow(row, keys) {
  var out = {};
  keys.forEach(function(k) { if (row[k] !== undefined) out[k] = row[k]; });
  return out;
}
function pruneData(key, data) {
  var keep = COLS_KEEP[key];
  if (!keep) return data;
  return data.map(function(row) { return pruneRow(row, keep); });
}
 
function saveRaw(key, data) {
  try {
    var pruned = pruneData(key, data);
    var json = JSON.stringify(pruned);
    // Warn if still large
    var kb = Math.round(json.length / 1024);
    if (kb > 4000) {
      console.warn('Data for', key, 'is', kb, 'KB — may hit localStorage quota');
    }
    localStorage.setItem(STORAGE_KEYS[key], json);
    var meta = loadMeta();
    meta[key] = { rows: data.length, savedAt: new Date().toISOString(), kb: kb };
    localStorage.setItem(STORAGE_META, JSON.stringify(meta));
  } catch(e) {
    console.warn('localStorage save failed:', e.message);
    // Show user-visible warning
    var w = document.getElementById('storage-warn');
    if (w) w.style.display = 'block';
  }
}
function loadMeta() {
  try { return JSON.parse(localStorage.getItem(STORAGE_META) || '{}'); } catch(e) { return {}; }
}
function loadAllRaw() {
  var loaded = false;
  ['all','universe','quant','qual'].forEach(function(key) {
    try {
      var stored = localStorage.getItem(STORAGE_KEYS[key]);
      if (stored) { raw[key] = JSON.parse(stored); loaded = true; }
    } catch(e) { console.warn('Failed to load', key, e.message); }
  });
  return loaded;
}
function clearStorage() {
  ['all','universe','quant','qual'].forEach(function(key) {
    localStorage.removeItem(STORAGE_KEYS[key]);
  });
  localStorage.removeItem(STORAGE_META);
}
function fmtSavedAt(iso) {
  if (!iso) return '';
  try {
    var d = new Date(iso);
    return d.toLocaleDateString('fr-CH', { day:'2-digit', month:'2-digit', year:'numeric' }) +
           ' ' + d.toLocaleTimeString('fr-CH', { hour:'2-digit', minute:'2-digit' });
  } catch(e) { return iso.slice(0,16).replace('T',' '); }
}
var drillData = null;
window._sd = [];
window._dpStocks = [];
window._drillPreset = null;
window._drillLabel = null;
 
// ════════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════════
var TIER_ORDER = { 'HC': 0, 'Buy': 1, 'Hold': 2, 'Watch': 3, '': 4 };
 
var QUAL_FIELDS = [
  { key: 'moat',         col: 'moat' },
  { key: 'mgmt',         col: 'management quality' },
  { key: 'scalability',  col: 'scalability and expansion potential' },
  { key: 'rd',           col: 'r&d budget' },
  { key: 'customer',     col: 'customer base & loyalty' },
  { key: 'adaptability', col: 'adaptability to disruption' },
  { key: 'regulatory',   col: 'regulatory environment' },
  { key: 'brand',        col: 'brand & reputation' },
];
var QUAL_LABELS = {
  moat: 'Moat', mgmt: 'Management', scalability: 'Scalability',
  rd: 'R&D Budget', customer: 'Customer Base', adaptability: 'Adaptability',
  regulatory: 'Regulatory Env.', brand: 'Brand & Reputation'
};
 
// ════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════
function cN(v) {
  if (!v || v === '-' || v === '#N/A' || v === 'N/A' || v === '') return null;
  var n = parseFloat(String(v).replace(/[EUR$GBP%\s,]/gi, '').replace(/[^0-9.\-]/g, ''));
  return isNaN(n) ? null : n;
}
function pct(v, d) {
  if (v === null || v === undefined) return '-';
  d = d || 2;
  return (v * 100).toFixed(d) + '%';
}
function fmtNum(v, suf, d) {
  var n = cN(v);
  return n === null ? '-' : n.toFixed(d || 1) + (suf || '');
}
function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function safeProp(s) {
  return String(s || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}
function sdot(v) {
  return '<span class="sdot sdot' + (v || 0) + '" title="' + (v ? 'Q' + v : '-') + '"></span>';
}
function qualDotBar(val) {
  // 1=best (green) → 4=worst (red)
  var colors = { 1: '#1e7e4a', 2: '#1a6a9a', 3: '#856404', 4: '#c0392b' };
  var labels = { 1: 'Excellent', 2: 'Bon', 3: 'Moyen', 4: 'Faible' };
  var col = val ? colors[val] : 'var(--border)';
  var lbl = val ? labels[val] : '—';
  var html = '<div class="qual-score-dots">';
  // 4 squares: filled ones use the score color, empty ones are grey
  for (var i = 1; i <= 4; i++) {
    html += '<div class="qual-dot' + (val && i <= val ? ' qdot-filled-' + val : '') + '" title="' + i + '"></div>';
  }
  html += '</div>';
  html += '<span class="qual-score-num" style="color:' + col + '">' + (val || '—') + '</span>';
  html += '<span style="font-size:8px;color:' + col + ';font-weight:700;margin-left:6px;text-transform:uppercase;letter-spacing:.05em">' + (val ? lbl : '') + '</span>';
  return html;
}
function uCls(u) {
  if (u === null) return '';
  if (u >= 0.20) return 'uhi';
  if (u >= 0.10) return 'umed';
  if (u >= 0) return 'ulo';
  return 'uneg';
}
function qCls(q) { return ['q0', 'q1', 'q2', 'q3', 'q4'][q] || 'q0'; }
function tierCls(t) {
  return t === 'HC' ? 'tier-hc' : t === 'Buy' ? 'tier-buy' : t === 'Hold' ? 'tier-hold' : 'tier-watch';
}
function normalizeRegion(raw) {
  // Uses both the region text AND the country code from all_stocks or universe
  // Priority: try to match specific countries first, then broader regions
  var v = String(raw || '').trim().toUpperCase();
  if (!v) return 'Other';
 
  // ── Switzerland ──
  if (v === 'CH' || v === 'CHE' || v === 'SWITZERLAND' || v === 'SUISSE' || v === 'SWISS') return 'Switzerland';
 
  // ── UK ──
  if (v === 'UK' || v === 'GB' || v === 'GBR' || v === 'UNITED KINGDOM' || v === 'GREAT BRITAIN' || v === 'ENGLAND') return 'UK';
 
  // ── USA ──
  if (v === 'US' || v === 'USA' || v === 'UNITED STATES' || v === 'UNITED STATES OF AMERICA' || v === 'U.S.' || v === 'U.S.A.') return 'USA';
 
  // ── Canada ──
  if (v === 'CA' || v === 'CAN' || v === 'CANADA') return 'Canada';
 
  // ── Europe (continental) — common country codes + region labels ──
  var europeISO = ['DE','AUT','BE','BEL','DK','DNK','ES','ESP','FI','FIN','FR','FRA','GR','GRC',
                   'IE','IRL','IT','ITA','LU','LUX','NL','NLD','NO','NOR','PL','POL','PT','PRT',
                   'SE','SWE','AT','HU','HUN','CZ','CZE','RO','ROU','SK','SVK','SI','SVN',
                   'HR','HRV','BG','BGR','EE','EST','LT','LTU','LV','LVA','MT','MLT','CY','CYP',
                   'IS','ISL','LI','LIE'];
  if (europeISO.indexOf(v) > -1) return 'Europe';
  if (v === 'EUROPE' || v === 'EUROPEAN UNION' || v === 'EU' || v === 'EURO' ||
      v === 'EUROZONE' || v === 'CONTINENTAL EUROPE' || v === 'EUROPE EX UK') return 'Europe';
 
  // ── Partial matches for region text fields ──
  if (v.indexOf('SWITZ') > -1 || v.indexOf('SUISSE') > -1) return 'Switzerland';
  if (v.indexOf('UNITED KINGDOM') > -1 || v.indexOf('BRIT') > -1) return 'UK';
  if (v.indexOf('UNITED STATES') > -1 || v.indexOf('NORTH AMERICA') > -1) return 'USA';
  if (v.indexOf('CANADA') > -1) return 'Canada';
  if (v.indexOf('EUROPE') > -1 || v.indexOf('EURO') > -1) return 'Europe';
 
  return 'Other';
}
 
function normalizeTier(v) {
  if (!v) return '';
  var u = String(v).trim().toUpperCase();
  if (u === 'HIGH CONVICTION' || u === 'HC') return 'HC';
  if (u === 'BUY' || u === 'STRONG BUY') return 'Buy';
  if (u === 'HOLD' || u === 'NEUTRAL') return 'Hold';
  if (u === 'SELL' || u === 'WATCH') return 'Watch';
  return v;
}
function isValidISIN(v) {
  if (!v) return false;
  var s = String(v).trim();
  if (s.length < 6) return false;
  var skip = ['YTD', 'N/A', '#N/A', 'ISIN', 'ID_ISIN', 'NAME', 'TICKER', 'SOURCE', 'DATE', '', 'SECURITIES', 'ERROR CODE'];
  if (skip.indexOf(s.toUpperCase()) > -1) return false;
  return /[A-Z0-9]{4,}/i.test(s);
}
 
// ════════════════════════════════════════════════════
// CSV PARSER — handles Bloomberg metadata rows
// ════════════════════════════════════════════════════
function parseCSV(text) {
  // ── Detect separator ──
  var firstLine = text.slice(0, 2000);
  var sep = firstLine.indexOf('\t') > -1 ? '\t' : (firstLine.indexOf(';') > -1 ? ';' : ',');
 
  // ── RFC 4180 tokenizer — handles quoted fields with embedded newlines/commas ──
  function tokenize(str, delimiter) {
    var rows = [];
    var row = [];
    var field = '';
    var inQuote = false;
    var i = 0;
    while (i < str.length) {
      var ch = str[i];
      if (inQuote) {
        if (ch === '"') {
          if (str[i+1] === '"') { field += '"'; i += 2; continue; } // escaped quote
          else { inQuote = false; i++; continue; }
        }
        field += ch; i++;
      } else {
        if (ch === '"') { inQuote = true; i++; continue; }
        if (ch === delimiter) { row.push(field.trim()); field = ''; i++; continue; }
        if (ch === '\r' && str[i+1] === '\n') {
          row.push(field.trim()); rows.push(row); row = []; field = ''; i += 2; continue;
        }
        if (ch === '\n') {
          row.push(field.trim()); rows.push(row); row = []; field = ''; i++; continue;
        }
        field += ch; i++;
      }
    }
    if (field.trim() || row.length) { row.push(field.trim()); rows.push(row); }
    return rows;
  }
 
  var allRows = tokenize(text, sep);
  if (allRows.length < 2) return [];
 
  // ── Find real header row: contains id_isin, isin, or securities ──
  var headerIdx = 0;
  for (var i = 0; i < Math.min(8, allRows.length); i++) {
    var joined = allRows[i].join(' ').toLowerCase();
    if (joined.indexOf('id_isin') > -1 || joined.indexOf('isin') > -1 || joined.indexOf('securities') > -1) {
      headerIdx = i; break;
    }
  }
 
  // ── Normalize headers: lowercase, collapse whitespace, remove quotes ──
  var headers = allRows[headerIdx].map(function(h) {
    return h.toLowerCase().replace(/['"]/g, '').replace(/[\r\n\t]+/g, ' ').replace(/\s+/g, ' ').trim();
  });
 
  // ── Handle duplicate header names (e.g. two "PRC" columns in Bloomberg export) ──
  // Deduplicate by appending _2, _3 etc — keeps first occurrence as-is
  var seen = {};
  headers = headers.map(function(h) {
    if (!h) return '_empty_' + Math.random();
    if (!seen[h]) { seen[h] = 1; return h; }
    seen[h]++;
    return h + '_' + seen[h];
  });
  var rows = allRows.slice(headerIdx + 1).map(function(cols) {
    return headers.reduce(function(acc, h, i) {
      acc[h] = (cols[i] || '').trim();
      return acc;
    }, {});
  });
 
  // ── Filter: must have a valid ISIN ──
  return rows.filter(function(r) {
    var isin = r['id_isin'] || r['isin'] || r['securities'] || '';
    return isValidISIN(isin);
  });
}
 
function getISIN(r) {
  return String(r['id_isin'] || r['isin'] || r['securities'] || '').trim().toUpperCase();
}
 
function hcGet(s, keys) {
  for (var i = 0; i < keys.length; i++) {
    var v = s[keys[i].toLowerCase()];
    if (v !== undefined && v !== '') return v;
  }
  return '';
}
 
// Debug helper — call debugRaw('universe') in browser console to inspect parsed columns
window.debugRaw = function(key) {
  var d = raw[key];
  if (!d || !d.length) { console.log('No data for', key); return; }
  console.log('=== ' + key + ' — first row keys ===');
  console.log(Object.keys(d[0]).join('\n'));
  console.log('=== first row values ===');
  console.log(d[0]);
  console.log('=== upside sample (first 5) ===');
  d.slice(0,5).forEach(function(r) {
    console.log(r['id_isin'] || r['isin'], {
      upside: r['upside downside'] || r['upside/downside'] || r['upside'],
      target: r['price target (1)'] || r['pt override'] || r['pt cfra'],
      rating: r['rating override'] || r['rating cfra'] || r['rating']
    });
  });
};
 
// ════════════════════════════════════════════════════
// FILE HANDLING
// ════════════════════════════════════════════════════
function handleFile(key, inp) {
  var file = inp.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var data = parseCSV(e.target.result);
    raw[key] = data;
    saveRaw(key, data);
    // If we already have a loaded universe, auto-refuse immediately
    if (raw.all && raw.universe) {
      runFusion(); // re-fuses and goes to macro
    } else {
      renderFiles(); // stay on files page, show updated status
    }
  };
  reader.readAsText(file);
}
 
// ════════════════════════════════════════════════════
// FUSION — join all 4 files by ISIN
// Base: raw.universe (equity universe is the master list)
// Enriched by: all_stocks (prices, sector, perf), quant, qual
// ════════════════════════════════════════════════════
function runFusion() {
  if (!raw.all || !raw.universe) return;
 
  // Build lookup maps for O(1) joins
  var allMap = {};
  (raw.all || []).forEach(function(r) {
    var isin = getISIN(r).toLowerCase();
    if (isin) allMap[isin] = r;
  });
  var quantMap = {};
  (raw.quant || []).forEach(function(r) {
    var isin = getISIN(r).toLowerCase();
    if (isin) quantMap[isin] = r;
  });
  var qualMap = {};
  (raw.qual || []).forEach(function(r) {
    var isin = getISIN(r).toLowerCase();
    if (isin) qualMap[isin] = r;
  });
 
  // Iterate universe as the base — every title in equity_universe is included
  universe = raw.universe.map(function(u) {
    var isinRaw = getISIN(u);
    var isin    = isinRaw.toLowerCase();
    var a       = allMap[isin] || {};    // all_stocks enrichment
    var q       = quantMap[isin] || {};  // quant enrichment
    var l       = qualMap[isin] || {};   // qual enrichment
 
    // ── TIER — Rating Override always takes precedence ──
    var ratingOverride = hcGet(u, ['rating override']);
    var ratingCFRA     = hcGet(u, ['rating cfra', 'rating']);
    var ratingRaw      = ratingOverride || ratingCFRA;
    var tier           = normalizeTier(ratingRaw);
 
    // ── Identity — prefer all_stocks, fallback to universe ──
    var name    = hcGet(u, ['company name', 'company', 'name']) || hcGet(a, ['name', 'long_comp_name', 'security_des']) || isinRaw;
    var ticker  = hcGet(u, ['ticker']) || hcGet(a, ['ticker']);
    var sector  = hcGet(u, ['sector name', 'sector']) || hcGet(a, ['gics_sector_name', 'gics sector name']);
    var regionRaw = hcGet(u, ['region', 'geography']) || hcGet(a, ['region_or_country', 'region or country']);
    var countryRaw = hcGet(a, ['cntry_of_domicile', 'country_iso', 'bb_country_code', 'parent_comp_country_iso']) ||
                     hcGet(a, ['country_full_name']);
    // Normalize: try country code first (more precise), fallback to region label
    var region  = normalizeRegion(countryRaw) !== 'Other'
                    ? normalizeRegion(countryRaw)
                    : normalizeRegion(regionRaw);
    var country = hcGet(a, ['country_full_name', 'cntry_of_domicile']) || regionRaw;
    var crncy   = hcGet(u, ['crncy', 'currency']) || hcGet(a, ['crncy']);
    var mktCap  = hcGet(u, ['market cap', 'market\n cap']) || hcGet(a, ['cur_mkt_cap', 'current_market_cap_eod']) || hcGet(q, ['market cap (usd bn)']);
    var coreSat = hcGet(u, ['core satellite', 'core/satellite', 'c/s']);
    var esg     = hcGet(u, ['esg leader**', 'esg leader']);
 
    // ── Pricing — universe has the analyst data, all_stocks has live prices ──
    var lastPx  = hcGet(u, ['last price']) || hcGet(a, ['px_last', 'px_last_eod', 'px_close_1d']);
    var hi52    = hcGet(a, ['high_52week']);
    var lo52    = hcGet(a, ['low_52week']);
    var peRatio = hcGet(a, ['pe_ratio_eod']) || hcGet(q, ['pe', 'best pe']);
 
    // Returns: prefer all_stocks absolute returns
    var ret1d = hcGet(a, ['chg_pct_1d', 'px_dt_1d']);
    var ret1m = hcGet(a, ['px_dt_1m']);
    var ret3m = hcGet(a, ['px_dt_3m']);
    var ret6m = hcGet(a, ['px_dt_6m']);
    var ret1y = hcGet(a, ['px_dt_1yr', 'px_dt_1y']);
 
    // ── Target price logic ──
    //   HC    → PT Override (Mirabaud own target), fallback PT CFRA
    //   Buy/Hold → Price Target (1) consensus Bloomberg
    var ptOverride  = hcGet(u, ['pt override']);
    var ptCFRA      = hcGet(u, ['pt cfra']);
    var ptConsensus = hcGet(u, ['price target (1)', 'price target', 'target price']);
    var target = tier === 'HC'
      ? (ptOverride || ptCFRA || ptConsensus)
      : (ptConsensus || ptCFRA);
 
    // ── Core universe metrics — directly from universe file ──
    var upside  = cN(hcGet(u, ['upside downside', 'upside/downside', 'upside']));
    var fwdPE   = hcGet(u, ['forward pe', 'forward p/e', 'fwd pe']) || hcGet(q, ['pe', 'best pe']);
    var ytdRet  = hcGet(u, ['ytd return', 'ytd']) || ret1y;
    var ytdRel  = hcGet(u, ['ytd relative*', 'ytd relative']);
    var expGr   = hcGet(u, ['expected growth yoy', 'expected growth']);
    var divYield= hcGet(u, ['dividend yield', 'div yield']) || hcGet(a, ['eqy_dvd_yld_12m', 'eqy_dvd_yld']);
 
    // ── Quant fields ──
    var qCombined  = parseInt(q['combined quartile']) || 0;
    var qValue     = parseInt(q['vl value creation quartile']) || 0;
    var qEarnings  = parseInt(q['earnings revisions quartile']) || 0;
    var qQuality   = parseInt(q['quality quartile']) || 0;
    var qProfitab  = parseInt(q['profitability quartile']) || 0;
    var qGrowth    = parseInt(q['growth quartile']) || 0;
    var qBSCF      = parseInt(q['bs & cf quartile']) || 0;
    var qValuation = parseInt(q['valuation quartile']) || 0;
    var qSentiment = parseInt(q['sentiment quartile']) || 0;
    var stopLoss   = q['stop loss signal'] || '';
    var tech       = q['short term technical          %bollinger [30d]'] || q['short term technical'] || '';
    var vol180     = q['volatililty 180 d'] || q['volatility 180 d'] || '';
    var betaDown   = q['beta_down'] || '';
    var betaUp     = q['beta up'] || '';
    var perfRel1w  = q['relative performance1w'] || q['relative performance 1w'] || '';
    var perfRel1m  = q['relative performance 1 month'] || '';
    var perfRel3m  = q['relative performance 3 month'] || '';
    var perfRel6m  = q['relative performance 6 month'] || '';
    var perfRel1y  = q['relative performance 1 year'] || '';
    var dist52hi   = q['distance to 52w high'] || '';
    var dist52lo   = q['distance to 52w low'] || '';
    var roe        = q['return on equity'] || q['roe lf'] || '';
    var roa        = q['return on assets'] || q['roa lf'] || '';
    var opm        = q['operating margin'] || q['opm lf'] || '';
    var netDebtEb  = q['net debt / ebitda'] || '';
    var fcfYield   = q['fcf yield'] || '';
    var evEbitda   = q['ev / ebitda'] || '';
 
    // ── Qual scores ──
    var qualScores = {};
    QUAL_FIELDS.forEach(function(f) {
      var v = parseInt(l[f.col]);
      qualScores[f.key] = isNaN(v) ? null : v;
    });
    var qualVals = QUAL_FIELDS.map(function(f) { return qualScores[f.key]; }).filter(function(v) { return v !== null; });
    var qualAvg  = qualVals.length ? qualVals.reduce(function(a, b) { return a + b; }, 0) / qualVals.length : null;
 
    // ── Coverage ──
    var inAllStocks = !!allMap[isin];
    var hasQuant    = !!quantMap[isin];
    var hasQual     = !!qualMap[isin];
    var coverage    = hasQual ? 'full' : hasQuant ? 'quant' : 'basic';
 
    // ── Risk flags ──
    var flags = [];
    if (upside !== null && upside < 0.08) flags.push('Low Upside');
    if (qCombined >= 4) flags.push('Quant Q4');
    if (stopLoss.toLowerCase().indexOf('stop') > -1) flags.push('Stop Loss');
    var fwdPEn = cN(fwdPE); if (fwdPEn && fwdPEn > 35) flags.push('Stretched P/E');
    if (ratingRaw.toLowerCase().indexOf('sell') > -1) flags.push('Sell');
    if (qualAvg !== null && qualAvg >= 3) flags.push('Qual. Weak');
 
    return {
      id_isin: isinRaw, ticker: ticker, name: name,
      region: region, sector: sector, country: country, crncy: crncy,
      industry: hcGet(a, ['gics_industry_name']) || '',
      tier: tier, ratingRaw: ratingRaw, coverage: coverage,
      inUniverse: true, inAllStocks: inAllStocks, hasQuant: hasQuant, hasQual: hasQual,
      coreSat: coreSat, esg: esg, mktCap: mktCap,
      lastPx: lastPx, target: target, ptOverride: ptOverride, ptCFRA: ptCFRA, ptConsensus: ptConsensus,
      upside: upside, fwdPE: fwdPE, peRatio: peRatio,
      hi52: hi52, lo52: lo52, divYield: divYield,
      ytdRet: ytdRet, ytdRel: ytdRel, expGr: expGr,
      ret1d: ret1d, ret1m: ret1m, ret3m: ret3m, ret6m: ret6m, ret1y: ret1y,
      qCombined: qCombined, qValue: qValue, qEarnings: qEarnings,
      qQuality: qQuality, qProfitab: qProfitab, qGrowth: qGrowth,
      qBSCF: qBSCF, qValuation: qValuation, qSentiment: qSentiment,
      stopLoss: stopLoss, tech: tech, vol180: vol180, betaDown: betaDown, betaUp: betaUp,
      perfRel1w: perfRel1w, perfRel1m: perfRel1m, perfRel3m: perfRel3m,
      perfRel6m: perfRel6m, perfRel1y: perfRel1y,
      dist52hi: dist52hi, dist52lo: dist52lo,
      roe: roe, roa: roa, opm: opm, netDebtEb: netDebtEb, fcfYield: fcfYield, evEbitda: evEbitda,
      qualScores: qualScores, qualAvg: qualAvg,
      flags: flags,
      risk: flags.length >= 2 ? 'high' : flags.length === 1 ? 'medium' : 'low'
    };
  });
 
 
  showView('macro');
}

function showView(v) {

    '</div>';

function openDrill(title, subtitle, stocks) {
  drillData = { title: title, subtitle: subtitle, stocks: stocks };
  document.getElementById('dp-title').textContent = title;
  document.getElementById('dp-subtitle').textContent = subtitle;
  document.getElementById('dp-count').textContent = stocks.length + ' titre' + (stocks.length > 1 ? 's' : '');

function closeDrill() {
  document.getElementById('drill-panel').classList.remove('open');

  if (mw) mw.classList.remove('shifted');
  drillData = null;
  document.querySelectorAll('.kpi.active,.rrow.active,.brow.active,.tier-kpi.active').forEach(function(el) { el.classList.remove('active'); });
}
function renderDrillTable(stocks) {
  var sorted = stocks.slice().sort(function(a, b) {
    var ta = TIER_ORDER[a.tier] || 9, tb = TIER_ORDER[b.tier] || 9;
    if (ta !== tb) return ta - tb;
    return (b.upside || -999) - (a.upside || -999);
  });
  window._dpStocks = sorted;
  var rows = sorted.map(function(s, i) {
    var ytdN = cN(s.ytdRet);
    return '<tr onclick="openStockModal(window._dpStocks[' + i + '])">' +
      '<td><div class="dp-name">' + esc(s.name) + '</div><div class="dp-isin">' + esc(s.id_isin) + (s.ticker ? ' &middot; ' + esc(s.ticker) : '') + '</div></td>' +
      '<td><span class="tier ' + tierCls(s.tier) + '">' + esc(s.tier || '—') + '</span></td>' +
      '<td style="text-align:center"><span class="qb ' + qCls(s.qCombined) + '">' + (s.qCombined ? 'Q' + s.qCombined : '—') + '</span></td>' +
      '<td style="text-align:right"><span style="font-weight:700;color:' + (s.upside >= 0.15 ? 'var(--green)' : s.upside >= 0 ? 'var(--muted)' : 'var(--red)') + '">' + (s.upside !== null ? pct(s.upside) : '—') + '</span></td>' +
      '<td style="text-align:right;font-weight:700;font-size:10px">' + (cN(s.fwdPE) ? parseFloat(s.fwdPE).toFixed(2) + 'x' : '—') + '</td>' +
      '<td><span class="rb ' + (s.risk === 'high' ? 'rhi' : s.risk === 'medium' ? 'rme' : 'rlo') + '">' + s.risk + '</span></td>' +
      '</tr>';
  }).join('');
  document.getElementById('dp-body').innerHTML =

// Named drills — avoids string escaping issues in HTML attributes

  // Upside averages — calculated on equity universe only (titles with upside defined)

    var w = arr.filter(function(s) { return s.upside !== null; });

  var regions = Object.entries(regMap).map(function(e) {

  }).sort(function(a, b) { return b.count - a.count; });
 
  // Sectors

// SCREEN VIEW

function buildScreen() {
  var base = window._drillPreset || universe;
  var label = window._drillLabel || null;
  window._drillPreset = null;
  window._drillLabel = null;
 
  var regions = ['All'].concat(Array.from(new Set(universe.map(function(s) { return s.region; }).filter(Boolean))).sort());
  var sectors = ['All'].concat(Array.from(new Set(universe.map(function(s) { return s.sector; }).filter(Boolean))).sort());
 
  var regOpts = regions.map(function(r) { return '<option' + (r === filters.region ? ' selected' : '') + '>' + esc(r) + '</option>'; }).join('');
  var secOpts = sectors.map(function(s) { return '<option' + (s === filters.sector ? ' selected' : '') + '>' + esc(s) + '</option>'; }).join('');
 
  var tierChips = ['HC', 'Buy', 'Hold'].map(function(t) {
    var on = filters.tiers.indexOf(t) > -1;
    return '<button class="chip chip-' + t.toLowerCase() + (on ? ' on' : '') + '" onclick="toggleTier(\'' + t + '\')">' + t + '</button>';
  }).join('');
  var qChips = [1, 2, 3, 4].map(function(q) {
    var on = filters.quants.indexOf(q) > -1;
    return '<button class="chip ' + (on ? 'q' + q + 'on' : '') + '" onclick="toggleQ(' + q + ')">Q' + q + '</button>';
  }).join('');
  var rChips = ['All', 'low', 'medium', 'high'].map(function(r) {
    var lbl = r === 'All' ? 'Tous' : r.charAt(0).toUpperCase() + r.slice(1);
    return '<button class="chip' + (filters.risk === r ? ' on' : '') + '" onclick="setRisk(\'' + r + '\')">' + lbl + '</button>';
  }).join('');
  var divChips = [0, 1, 2, 3, 4].map(function(d) {
    var lbl = d === 0 ? 'Tous' : '≥' + d + '%';
    return '<button class="chip' + (filters.divMin === d ? ' on' : '') + '" onclick="setDivMin(' + d + ')">' + lbl + '</button>';
  }).join('');
 
  // Filter
  var data = base;
  if (filters.search) { var q = filters.search.toLowerCase(); data = data.filter(function(s) { return s.name.toLowerCase().indexOf(q) > -1 || s.id_isin.toLowerCase().indexOf(q) > -1 || (s.ticker || '').toLowerCase().indexOf(q) > -1; }); }
  if (filters.region !== 'All') data = data.filter(function(s) { return s.region === filters.region; });
  if (filters.sector !== 'All') data = data.filter(function(s) { return s.sector === filters.sector; });
  if (filters.tiers.length > 0) data = data.filter(function(s) { return filters.tiers.indexOf(s.tier) > -1; });
  if (filters.quants.length > 0) data = data.filter(function(s) { return filters.quants.indexOf(s.qCombined) > -1; });
  if (filters.risk !== 'All') data = data.filter(function(s) { return s.risk === filters.risk; });
  if (filters.divMin > 0) data = data.filter(function(s) {
    var d = cN(s.divYield);
    return d !== null && d >= filters.divMin;
  });
 
  // Sort
  var dir = sortState.dir === 'asc' ? 1 : -1;
  data = data.slice().sort(function(a, b) {
    if (sortState.field === 'tier')    return dir * ((TIER_ORDER[a.tier] || 9) - (TIER_ORDER[b.tier] || 9));
    if (sortState.field === 'name')    return dir * a.name.localeCompare(b.name);
    if (sortState.field === 'upside')  return dir * ((a.upside != null ? a.upside : -999) - (b.upside != null ? b.upside : -999));
    if (sortState.field === 'qCombined') return dir * ((a.qCombined || 9) - (b.qCombined || 9));
    if (sortState.field === 'fwdPE')   return dir * ((cN(a.fwdPE) || 9999) - (cN(b.fwdPE) || 9999));
    if (sortState.field === 'ytdRet')  return dir * ((cN(a.ytdRet) || -999) - (cN(b.ytdRet) || -999));
    if (sortState.field === 'qualAvg') return dir * ((a.qualAvg || 9999) - (b.qualAvg || 9999));
    if (sortState.field === 'divYield') return dir * ((cN(a.divYield) || -999) - (cN(b.divYield) || -999));
    return 0;
  });
  window._sd = data;
 
  function arr(f) { if (sortState.field !== f) return '<span style="opacity:.3">&updownarrow;</span>'; return sortState.dir === 'asc' ? '&#8593;' : '&#8595;'; }
  function sh(f, lbl) { return '<button class="srt' + (sortState.field === f ? ' on' : '') + '" onclick="setSort(\'' + f + '\')">' + lbl + ' ' + arr(f) + '</button>'; }
 
  var rows = data.length === 0 ?
    '<tr><td colspan="11"><div class="empty"><div class="eico">&#8709;</div><div class="emsg">Aucun titre</div></div></td></tr>' :

        '<td style="text-align:right;font-weight:700;color:' + (divN > 0 ? 'var(--green)' : 'var(--muted)') + '">' + (divN !== null ? divN.toFixed(2) + '%' : '—') + '</td>' +
        '<td>' + flags + '</td>' +

    }).join('');
 
  var presetBanner = label ?
    '<div class="preset-banner"><span>&#8592; Filtré depuis Macro : <b>' + esc(label) + '</b></span>' +

  document.getElementById('main').innerHTML = presetBanner +

}
 
// ════════════════════════════════════════════════════
// MOMENTUM VIEW
// ════════════════════════════════════════════════════
 
// Momentum score composite (0-100, higher = better momentum)
// 4 signal groups, each normalized 0-25:
//   1. Absolute performance  (ret1m, ret3m, ret6m)        → 25pts
//   2. Relative performance  (perfRel1w, perfRel1m, perfRel3m) → 25pts
//   3. Quant signals         (qSentiment, qEarnings)       → 25pts
//   4. Technical             (tech/Bollinger signal)       → 25pts
 
function computeMomentum(s) {
  var scores = { abs: null, rel: null, quant: null, tech: null };
 
  // ── 1. Absolute performance (avg of available periods, normalized) ──
  var absVals = [cN(s.ret1m), cN(s.ret3m), cN(s.ret6m)].filter(function(v) { return v !== null; });
  if (absVals.length > 0) {
    var absAvg = absVals.reduce(function(a, b) { return a + b; }, 0) / absVals.length;
    // Map: -20% → 0, 0% → 12.5, +20% → 25 (capped)
    scores.abs = Math.max(0, Math.min(25, 12.5 + absAvg * 0.625));
  }
 
  // ── 2. Relative performance (avg of available periods) ──
  var relVals = [cN(s.perfRel1w), cN(s.perfRel1m), cN(s.perfRel3m)].filter(function(v) { return v !== null; });
  if (relVals.length > 0) {
    var relAvg = relVals.reduce(function(a, b) { return a + b; }, 0) / relVals.length;
    // Map: -15% → 0, 0% → 12.5, +15% → 25 (capped)
    scores.rel = Math.max(0, Math.min(25, 12.5 + relAvg * 0.833));
  }
 
  // ── 3. Quant signals: qSentiment + qEarnings (1=best, 4=worst → invert) ──
  var quantSigs = [s.qSentiment, s.qEarnings].filter(function(v) { return v > 0; });
  if (quantSigs.length > 0) {
    var quantAvg = quantSigs.reduce(function(a, b) { return a + b; }, 0) / quantSigs.length;
    // Q1 → 25, Q2 → 16.7, Q3 → 8.3, Q4 → 0
    scores.quant = Math.max(0, (5 - quantAvg) / 4 * 25);
  }
 
  // ── 4. Technical / Bollinger signal ──
  var tech = String(s.tech || '').toUpperCase();
  var stop = String(s.stopLoss || '').toUpperCase();
  if (tech || stop) {
    if (stop.indexOf('STOP') > -1) {
      scores.tech = 0; // stop loss triggered → worst
    } else if (tech.indexOf('OVERBOUGHT') > -1 || tech.indexOf('ABOVE') > -1 || tech.indexOf('BULL') > -1 || tech.indexOf('BUY') > -1) {
      scores.tech = 22;
    } else if (tech.indexOf('OVERSOLD') > -1 || tech.indexOf('BELOW') > -1 || tech.indexOf('BEAR') > -1 || tech.indexOf('SELL') > -1) {
      scores.tech = 5;
    } else if (tech.indexOf('NEUTRAL') > -1 || tech.indexOf('MID') > -1 || tech) {
      scores.tech = 12.5; // neutral signal
    }
  }
 
  // ── Composite: average of available signals, scaled to 0-100 ──
  var available = Object.keys(scores).filter(function(k) { return scores[k] !== null; });
  if (available.length === 0) return { total: null, scores: scores, available: 0 };
  var total = available.reduce(function(sum, k) { return sum + scores[k]; }, 0);
  // Scale to 0-100 based on max possible (25 per signal)
  var maxPossible = available.length * 25;
  var normalized = (total / maxPossible) * 100;
  return { total: Math.round(normalized), scores: scores, available: available.length };
}
 
function scoreGrade(v) {
  if (v === null) return { grade: '—', cls: 'score-d' };
  if (v >= 75) return { grade: 'S', cls: 'score-s' };
  if (v >= 60) return { grade: 'A', cls: 'score-a' };
  if (v >= 45) return { grade: 'B', cls: 'score-b' };
  if (v >= 30) return { grade: 'C', cls: 'score-c' };
  return { grade: 'D', cls: 'score-d' };
}
 
var momFilters = { tier: 'All', region: 'All', minScore: 0, minUpside: 0 };
 
function buildMomentum() {
  // Compute momentum for all stocks with enough data
  var scored = universe.map(function(s) {
    var m = computeMomentum(s);
    return { s: s, mom: m };
  }).filter(function(x) { return x.mom.total !== null && x.mom.available >= 2; });
 
  // Apply filters
  var data = scored;
  if (momFilters.tier !== 'All') data = data.filter(function(x) { return x.s.tier === momFilters.tier; });
  if (momFilters.region !== 'All') data = data.filter(function(x) { return x.s.region === momFilters.region; });
  if (momFilters.minScore > 0) data = data.filter(function(x) { return x.mom.total >= momFilters.minScore; });
  if (momFilters.minUpside > 0) data = data.filter(function(x) { return x.s.upside !== null && x.s.upside >= momFilters.minUpside / 100; });
 
  // Sort by composite score desc
  data = data.slice().sort(function(a, b) { return b.mom.total - a.mom.total; });
  window._momData = data;
 
  var total = data.length;
  var regions = ['All'].concat(Array.from(new Set(universe.map(function(s) { return s.region; }).filter(Boolean))).sort());
  var regOpts = regions.map(function(r) { return '<option' + (r === momFilters.region ? ' selected' : '') + '>' + esc(r) + '</option>'; }).join('');
 
  var tierChips = ['All', 'HC', 'Buy', 'Hold'].map(function(t) {
    var cls = t === 'HC' ? 'chip-hc' : t === 'Buy' ? 'chip-buy' : t === 'Hold' ? 'chip-hold' : '';
    var on = momFilters.tier === t;
    return '<button class="chip ' + cls + (on ? ' on' : '') + '" onclick="setMomTier(\'' + t + '\')">' + t + '</button>';
  }).join('');
 
  var minChips = [0, 30, 45, 60, 75].map(function(v) {
    var lbl = v === 0 ? 'Tous' : '≥' + v;
    return '<button class="chip' + (momFilters.minScore === v ? ' on' : '') + '" onclick="setMomMin(' + v + ')">' + lbl + '</button>';
  }).join('');
  var upsideChips = [0, 5, 10, 15, 20].map(function(v) {
    var lbl = v === 0 ? 'Tous' : '≥' + v + '%';
    return '<button class="chip' + (momFilters.minUpside === v ? ' on' : '') + '" onclick="setMomUpside(' + v + ')">' + lbl + '</button>';
  }).join('');
 
  // Top 3 highlights (best momentum in each tier)
  var topHC   = data.filter(function(x) { return x.s.tier === 'HC'; })[0];
  var topBuy  = data.filter(function(x) { return x.s.tier === 'Buy'; })[0];
  var topAll  = data[0];
 
  function hlCard(item, label, color) {
    if (!item) return '<div class="mom-highlight" style="border-top-color:' + color + ';opacity:.4"><div class="mom-hl-label">' + label + '</div><div class="mom-hl-name" style="color:var(--muted)">—</div><div class="mom-hl-meta">Aucun titre</div></div>';
    var g = scoreGrade(item.mom.total);
    return '<div class="mom-highlight" style="border-top-color:' + color + '" onclick="openStockModal(window._momData[' + data.indexOf(item) + '].s)">' +
      '<div class="mom-hl-label">' + label + '</div>' +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">' +
        '<span class="score-ring ' + g.cls + '">' + item.mom.total + '</span>' +
        '<div><div class="mom-hl-name">' + esc(item.s.name) + '</div>' +
        '<div class="mom-hl-meta">' + esc(item.s.tier) + ' &middot; ' + esc(item.s.region) + ' &middot; ' + esc(item.s.sector) + '</div></div>' +
      '</div>' +
      buildMomSignals(item) +
      '</div>';
  }
 
  function buildMomSignals(item) {
    var s = item.s;
    var sigs = [];
    var r1m = cN(s.perfRel1m), r3m = cN(s.perfRel3m);
    var a1m = cN(s.ret1m), a3m = cN(s.ret3m);
    if (r1m !== null) sigs.push('<span class="mom-sig ' + (r1m > 0 ? 'sig-pos' : r1m < 0 ? 'sig-neg' : 'sig-neu') + '">Rel 1M ' + (r1m > 0 ? '+' : '') + r1m.toFixed(2) + '%</span>');
    if (r3m !== null) sigs.push('<span class="mom-sig ' + (r3m > 0 ? 'sig-pos' : r3m < 0 ? 'sig-neg' : 'sig-neu') + '">Rel 3M ' + (r3m > 0 ? '+' : '') + r3m.toFixed(2) + '%</span>');
    if (a1m !== null) sigs.push('<span class="mom-sig ' + (a1m > 0 ? 'sig-pos' : a1m < 0 ? 'sig-neg' : 'sig-neu') + '">Abs 1M ' + (a1m > 0 ? '+' : '') + a1m.toFixed(2) + '%</span>');
    if (a3m !== null) sigs.push('<span class="mom-sig ' + (a3m > 0 ? 'sig-pos' : a3m < 0 ? 'sig-neg' : 'sig-neu') + '">Abs 3M ' + (a3m > 0 ? '+' : '') + a3m.toFixed(2) + '%</span>');
    if (s.qSentiment) sigs.push('<span class="mom-sig ' + (s.qSentiment <= 2 ? 'sig-pos' : 'sig-neg') + '">Sentiment Q' + s.qSentiment + '</span>');
    if (s.qEarnings)  sigs.push('<span class="mom-sig ' + (s.qEarnings <= 2 ? 'sig-pos' : 'sig-neg') + '">Earnings Rev Q' + s.qEarnings + '</span>');
    if (s.tech)       sigs.push('<span class="mom-sig sig-neu">' + esc(s.tech.slice(0, 20)) + '</span>');
    return '<div class="mom-signals">' + sigs.join('') + '</div>';
  }
 
  // Full ranked list
  var rows = data.map(function(item, idx) {
    var s = item.s;
    var g = scoreGrade(item.mom.total);
    var sc = item.mom.scores;
    var upN = s.upside !== null ? pct(s.upside, 2) : '—';
    var upCol = s.upside >= 0.15 ? 'var(--green)' : s.upside >= 0 ? 'var(--muted)' : 'var(--red)';
 
    function scVal(v, invert) {
      if (v === null) return '<span style="color:var(--muted)">—</span>';
      var pct25 = Math.round(v / 25 * 100);
      var col = pct25 >= 65 ? 'var(--green)' : pct25 >= 40 ? 'var(--accent-dark)' : 'var(--red)';
      return '<span style="color:' + col + ';font-weight:700">' + pct25 + '</span>';
    }
 
    return '<div class="mom-card" onclick="openStockModal(window._momData[' + idx + '].s)">' +
      '<div class="mom-rank">' + (idx + 1) + '</div>' +
      '<div class="mom-body">' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<span class="score-ring ' + g.cls + '">' + item.mom.total + '</span>' +
          '<div style="min-width:0">' +
            '<div class="mom-name">' + esc(s.name) + '</div>' +
            '<div class="mom-meta">' +
              '<span class="tier ' + tierCls(s.tier) + '" style="font-size:7px;padding:1px 5px">' + esc(s.tier || '—') + '</span>' +
              ' ' + esc(s.region) + ' &middot; ' + esc(s.sector) +
            '</div>' +
          '</div>' +
        '</div>' +
        buildMomSignals(item) +
      '</div>' +
      '<div class="mom-scores">' +
        '<div class="mom-score-col"><div class="mom-score-lbl">Abs</div><div class="mom-score-val">' + scVal(sc.abs) + '</div></div>' +
        '<div class="mom-score-col"><div class="mom-score-lbl">Rel</div><div class="mom-score-val">' + scVal(sc.rel) + '</div></div>' +
        '<div class="mom-score-col"><div class="mom-score-lbl">Quant</div><div class="mom-score-val">' + scVal(sc.quant) + '</div></div>' +
        '<div class="mom-score-col"><div class="mom-score-lbl">Tech</div><div class="mom-score-val">' + scVal(sc.tech) + '</div></div>' +
        '<div class="mom-score-col" style="border-left:1px solid var(--border);padding-left:8px"><div class="mom-score-lbl">Upside</div><div class="mom-score-val" style="color:' + upCol + '">' + upN + '</div></div>' +
      '</div>' +
    '</div>';
  }).join('');
 
  document.getElementById('main').innerHTML =
    '<div class="mom-wrap">' +
    // Header
    '<div style="display:flex;align-items:baseline;gap:12px;margin-bottom:4px">' +
      '<div style="font-size:22px;font-weight:700;letter-spacing:-.01em">Price Momentum</div>' +
      '<div style="font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase">Score composite 0–100 &mdash; ' + total + ' titres analys&eacute;s</div>' +
    '</div>' +
    '<div style="font-size:9px;color:var(--muted);margin-bottom:18px">Score = Perf. Absolue (25%) + Perf. Relative (25%) + Quant Sentiment & Earnings Rev. (25%) + Signal Technique (25%)</div>' +
 
    // Controls
    '<div class="mom-controls">' +
      '<span class="fl">Tier</span><div class="chips">' + tierChips + '</div>' +
      '<div class="sep"></div>' +
      '<span class="fl">R&eacute;gion</span><select class="fs" onchange="setMomRegion(this.value)">' + regOpts + '</select>' +
      '<div class="sep"></div>' +
      '<span class="fl">Score min.</span><div class="chips">' + minChips + '</div>' +
      '<div class="sep"></div>' +
      '<span class="fl">Upside min.</span><div class="chips">' + upsideChips + '</div>' +
      '<span class="rcnt" style="margin-left:auto">' + total + ' titres</span>' +
    '</div>' +
 
    // Score legend
    '<div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap">' +
      [['S','≥75 — Fort momentum','score-s'],['A','60–74 — Bon','score-a'],['B','45–59 — Neutre+','score-b'],['C','30–44 — Faible','score-c'],['D','<30 — Négatif','score-d']].map(function(g) {
        return '<div style="display:flex;align-items:center;gap:5px"><span class="score-ring ' + g[2] + '" style="width:22px;height:22px;font-size:9px">' + g[0] + '</span><span style="font-size:9px;color:var(--muted)">' + g[1] + '</span></div>';
      }).join('') +
    '</div>' +
 
    // Top 3 highlights
    '<div class="mom-section-title">Top Opportunit&eacute;s</div>' +
    '<div class="mom-top-grid">' +
      hlCard(topAll,  'Meilleur Score Global',     'var(--accent)') +
      hlCard(topHC,   'Meilleur HC',                'var(--tier-hc)') +
      hlCard(topBuy,  'Meilleur Buy',               'var(--tier-buy)') +
    '</div>' +
 
    // Full ranking
    '<div class="mom-section-title">Classement Complet &mdash; ' + total + ' titres</div>' +
    (total === 0
      ? '<div class="empty"><div class="eico">&#8709;</div><div class="emsg">Pas assez de donn&eacute;es momentum &mdash; fichier Quant requis</div></div>'
      : '<div class="mom-grid">' + rows + '</div>') +
    '</div>';
}
 
function setMomTier(v)    { momFilters.tier = v;        buildMomentum(); }
function setMomRegion(v)  { momFilters.region = v;      buildMomentum(); }
function setMomMin(v)     { momFilters.minScore = v;    buildMomentum(); }
function setMomUpside(v)  { momFilters.minUpside = v;   buildMomentum(); }

function setSearch(v) { filters.search = v; buildScreen(); }
function setRegion(v) { filters.region = v; buildScreen(); }
function setSector(v) { filters.sector = v; buildScreen(); }
function setRisk(v) { filters.risk = v; buildScreen(); }

function toggleTier(t) { var i = filters.tiers.indexOf(t); if (i > -1) filters.tiers.splice(i, 1); else filters.tiers.push(t); buildScreen(); }
function toggleQ(q) { var i = filters.quants.indexOf(q); if (i > -1) filters.quants.splice(i, 1); else filters.quants.push(q); buildScreen(); }
function setSort(f) { sortState = sortState.field === f ? { field: f, dir: sortState.dir === 'asc' ? 'desc' : 'asc' } : { field: f, dir: 'desc' }; buildScreen(); }

// STOCK MODAL
// ════════════════════════════════════════════════════
function openStockModal(s) {
  if (!s) return;
 
  var qSubFields = [
    { k: 'qValue', l: 'Value Creation' }, { k: 'qEarnings', l: 'Earnings Rev.' },
    { k: 'qQuality', l: 'Quality' }, { k: 'qProfitab', l: 'Profitability' },
    { k: 'qGrowth', l: 'Growth' }, { k: 'qBSCF', l: 'BS & CF' },
    { k: 'qValuation', l: 'Valuation' }, { k: 'qSentiment', l: 'Sentiment' },
  ];
 
  var qGrid = s.hasQuant ?
    '<div class="quant-grid">' + qSubFields.map(function(f) {
      var v = s[f.k];
      return '<div class="qg-item"><span class="qg-lbl">' + f.l + '</span><span class="qb ' + qCls(v) + '">' + (v ? 'Q' + v : '—') + '</span></div>';
    }).join('') + '</div>' : '<div class="no-data">Pas de données quant pour ce titre</div>';
 
  var qualGrid = s.hasQual ?
    QUAL_FIELDS.map(function(f) {
      var v = s.qualScores[f.key];
      return '<div class="qual-score-row"><span class="qual-score-lbl">' + QUAL_LABELS[f.key] + '</span>' + qualDotBar(v) + '</div>';
    }).join('') : '<div class="no-data">Scores qualitatifs disponibles uniquement pour les HC</div>';
 
  // Performances: prefer relative (quant file) then absolute (all_stocks)
  var perfData = [
    ['1W rel.', s.perfRel1w || s.ret1d],
    ['1M rel.', s.perfRel1m || s.ret1m],
    ['3M rel.', s.perfRel3m || s.ret3m],
    ['6M rel.', s.perfRel6m || s.ret6m],
    ['1Y rel.', s.perfRel1y || s.ret1y],
    ['YTD rel.', s.ytdRel || s.ytdRet],
  ];
  var perfHTML = '<div class="perf-grid">' + perfData.map(function(p) {
    var n = cN(p[1]);
    var col = n === null ? 'inherit' : n > 0 ? 'var(--green)' : 'var(--red)';
    return '<div class="perf-item"><div class="perf-lbl">' + p[0] + '</div>' +
      '<div class="perf-val" style="color:' + col + '">' + (n !== null ? (n > 0 ? '+' : '') + n.toFixed(2) + '%' : '—') + '</div></div>';
  }).join('') + '</div>';
 
  var fundHTML = s.hasQuant ? '<div class="mmetrics">' +
    [['ROE', s.roe, '%'], ['ROA', s.roa, '%'], ['Op. Margin', s.opm, '%'],
     ['FCF Yield', s.fcfYield, '%'], ['Net Debt/EBITDA', s.netDebtEb, 'x'], ['EV/EBITDA', s.evEbitda, 'x']].map(function(f) {
      var n = cN(f[1]);
      return '<div class="mmet"><div class="mml">' + f[0] + '</div><div class="mmv">' + (n !== null ? n.toFixed(2) + f[2] : '—') + '</div></div>';
    }).join('') + '</div>' : '<div class="no-data">Fondamentaux disponibles pour les titres avec scoring quant</div>';
 
  var flagH = s.flags.length ? '<div style="margin-top:10px">' + s.flags.map(function(f) {
    return '<span class="fglg' + (f === 'Low Upside' || f === 'Stretched P/E' || f === 'Qual. Weak' ? ' w' : '') + '">' + esc(f) + '</span>';
  }).join('') + '</div>' : '';
 
  var ytdN = cN(s.ytdRet);
  var stopColor = s.stopLoss && s.stopLoss.toUpperCase().indexOf('STOP') > -1 ? 'color:var(--red)' : '';
 
  var el = document.createElement('div');
  el.className = 'overlay'; el.id = 'modal';
  el.onclick = function(e) { if (e.target === el) closeModal(); };
  el.innerHTML =
    '<div class="modal"><div class="mhdr">' +
    '<button class="mclose" onclick="closeModal()">&#10005; Fermer</button>' +
    '<div class="mtag">' + esc(s.region) + (s.country && s.country !== s.region ? ' &middot; ' + esc(s.country) : '') + ' &middot; ' + esc(s.sector) + '</div>' +
    '<div class="mname">' + esc(s.name) + '</div>' +
    '<div class="misin">' + esc(s.id_isin) + (s.ticker ? ' &middot; ' + esc(s.ticker) : '') + (s.crncy ? ' &middot; ' + esc(s.crncy) : '') + '</div>' +
    '</div><div class="mbody">' +
 
    // Header summary
    '<div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap">' +
    '<span class="tier ' + tierCls(s.tier) + '">' + esc(s.tier || 'Référentiel') + '</span>' +
    '<span class="coverage-badge ' + (s.coverage === 'full' ? 'cov-full' : s.coverage === 'quant' ? 'cov-quant' : 'cov-basic') + '">Coverage : ' + s.coverage + '</span>' +
    (s.coreSat ? '<span style="font-size:9px;color:var(--muted);font-weight:700">' + esc(s.coreSat) + '</span>' : '') +
    (s.esg ? '<span style="font-size:9px;color:var(--green);font-weight:700">ESG &#10003;</span>' : '') +
    '</div>' +
 
    // Pricing
    '<div class="msec"><div class="mst">Prix &amp; Consensus</div>' +
    '<div class="mmetrics">' +
    '<div class="mmet"><div class="mml">Dernier Prix</div><div class="mmv">' + esc(s.lastPx || '—') + '</div></div>' +
    '<div class="mmet"><div class="mml">Target Price</div><div class="mmv mmo">' + esc(s.target || '—') + '</div></div>' +
    '<div class="mmet"><div class="mml">' + (s.tier === 'HC' ? 'Source : Override' : 'Source : Consensus') + '</div><div class="mmv" style="font-size:11px">' +
    (s.tier === 'HC'
      ? (s.ptOverride ? '<span style="color:var(--tier-hc);font-size:10px">HC Override</span>' : '<span style="color:var(--muted);font-size:10px">CFRA ' + esc(s.ptCFRA || '—') + '</span>')
      : '<span style="color:var(--blue);font-size:10px">Bloomberg consensus</span>') +
    '</div></div>' +
    '<div class="mmet"><div class="mml">Upside / Downside</div><div class="mmv ' + (s.upside > 0 ? 'mmg' : 'mmr') + '">' + (s.upside !== null ? pct(s.upside) : '—') + '</div></div>' +
    '<div class="mmet"><div class="mml">Fwd P/E</div><div class="mmv">' + (cN(s.fwdPE) ? parseFloat(s.fwdPE).toFixed(2) + 'x' : '—') + '</div></div>' +
    '<div class="mmet"><div class="mml">Growth YoY</div><div class="mmv">' + (cN(s.expGr) ? parseFloat(s.expGr).toFixed(2) + '%' : '—') + '</div></div>' +
    '<div class="mmet"><div class="mml">Dividend Yield</div><div class="mmv">' + (cN(s.divYield) ? parseFloat(s.divYield).toFixed(2) + '%' : '—') + '</div></div>' +
    '</div>' +
    '<div class="qr"><span class="qk">52W High / Low</span><span class="qv">' + (cN(s.hi52) !== null ? cN(s.hi52).toFixed(2) : '—') + ' / ' + (cN(s.lo52) !== null ? cN(s.lo52).toFixed(2) : '—') + '</span></div>' +
    '<div class="qr"><span class="qk">YTD Return</span><span class="qv" style="color:' + (ytdN > 0 ? 'var(--green)' : ytdN < 0 ? 'var(--red)' : 'inherit') + '">' + (ytdN !== null ? (ytdN > 0 ? '+' : '') + ytdN.toFixed(2) + '%' : '—') + '</span></div>' +
    '</div>' +
 
    // Quant
    '<div class="msec"><div class="mst"><span>Scores Quantitatifs</span>' + (s.hasQuant ? '<span class="qb ' + qCls(s.qCombined) + '">' + (s.qCombined ? 'Q' + s.qCombined + ' combined' : '—') + '</span>' : '') + '</div>' +
    qGrid +
    (s.hasQuant ? '<div class="qr" style="margin-top:8px"><span class="qk">Stop Loss Signal</span><span class="qv" style="' + stopColor + '">' + esc(s.stopLoss || '—') + '</span></div>' +
    '<div class="qr"><span class="qk">Technique ST</span><span class="qv">' + esc(s.tech || '—') + '</span></div>' +
    '<div class="qr"><span class="qk">Vol 180j &middot; Beta &darr;/&uarr;</span><span class="qv">' + (cN(s.vol180) !== null ? cN(s.vol180).toFixed(2) : '—') + ' &middot; ' + (cN(s.betaDown) !== null ? cN(s.betaDown).toFixed(2) : '—') + ' / ' + (cN(s.betaUp) !== null ? cN(s.betaUp).toFixed(2) : '—') + '</span></div>' : '') +
    '</div>' +
 
    // Qual
    '<div class="msec"><div class="mst"><span>Scores Qualitatifs</span>' + (s.qualAvg !== null ? '<span style="font-size:9px;color:var(--muted)">Moy. ' + s.qualAvg.toFixed(2) + ' &mdash; 1=meilleur</span>' : '') + '</div>' +
    qualGrid + '</div>' +
 
    // Performance
    '<div class="msec"><div class="mst">Performance</div>' + perfHTML + '</div>' +
 
    // Fundamentals
    '<div class="msec"><div class="mst">Fondamentaux</div>' + fundHTML + '</div>' +
 
    // Risk
    '<div class="msec"><div class="mst">Audit Risque</div>' +
    '<div class="qr"><span class="qk">Niveau</span><span class="rb ' + (s.risk === 'high' ? 'rhi' : s.risk === 'medium' ? 'rme' : 'rlo') + '">' + s.risk + '</span></div>' +
    flagH + '</div>' +
    '</div></div>';
  document.body.appendChild(el);
}
function closeModal() { var m = document.getElementById('modal'); if (m) m.remove(); }
 
// ── INIT — auto-load from localStorage ──────────────
(function() {
  var hadCache = loadAllRaw();
  if (hadCache && raw.all && raw.universe) {
    // Data complete — auto-fuse and go straight to macro
    runFusion();
  } else if (hadCache) {
    // Partial data — show upload page with what we have
    renderUpload();
  } else {
    renderUpload();
  }
})();
</script>
</body>
</html>
