<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirabaud HC | Investment Universe</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d0d0d;--paper:#f5f2ec;--cream:#ede9e0;--accent:#c8a84b;
  --accent-dark:#9a7a28;--muted:#888;--red:#c0392b;--green:#1e7e4a;
  --border:#d8d2c4;--white:#fff;
}
html,body{height:100%;background:var(--paper);color:var(--ink);font-family:monospace;font-size:13px}
#app{display:flex;flex-direction:column;height:100vh}
.main{flex:1;overflow-y:auto}
.header{background:var(--ink);color:var(--paper);padding:0 28px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:2px solid var(--accent)}
.brand{font-size:15px;font-weight:700;letter-spacing:0.05em}
.brand span{font-size:9px;font-weight:400;letter-spacing:0.25em;text-transform:uppercase;color:var(--accent);margin-left:10px}
.nav{display:flex;gap:24px;align-items:center}
.nav button{font-family:inherit;font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;background:none;border:none;color:#666;cursor:pointer;padding:4px 0;border-bottom:2px solid transparent;transition:all .15s}
.nav button.active,.nav button:hover{color:var(--accent);border-bottom-color:var(--accent)}
/* UPLOAD */
.upload-wrap{max-width:720px;margin:64px auto;padding:0 24px}
.upload-title{font-size:32px;font-weight:700;margin-bottom:6px;letter-spacing:-0.02em}
.upload-sub{font-size:9px;color:var(--muted);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:40px}
.upload-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:28px}
.ucard{border:1px solid var(--border);padding:20px;background:var(--white);transition:border-color .2s}
.ucard.loaded{border-color:var(--accent);background:#fdf9ef}
.ctag{font-size:8px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.ctitle{font-size:13px;font-weight:700;margin-bottom:4px}
.cdesc{font-size:10px;color:var(--muted);line-height:1.5;margin-bottom:14px}
.cstatus{font-size:9px;font-weight:700;margin-bottom:10px}
.ok{color:var(--green)}.pend{color:var(--muted)}
.flabel{display:inline-block;font-size:9px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;border:1px solid var(--ink);padding:6px 12px;cursor:pointer;transition:all .15s}
.flabel:hover{background:var(--ink);color:var(--paper)}
input[type=file]{display:none}
.run-btn{font-family:inherit;font-size:10px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;background:var(--ink);color:var(--paper);border:none;padding:13px 28px;cursor:pointer;transition:background .15s}
.run-btn:hover{background:var(--accent-dark)}
.run-btn:disabled{opacity:.3;cursor:not-allowed}
/* MACRO */
.macro-wrap{padding:28px}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.kpi{background:var(--white);border:1px solid var(--border);padding:16px 18px}
.kpi-lbl{font-size:8px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.kpi-val{font-size:24px;font-weight:700;line-height:1}
.kpi-sub{font-size:9px;color:var(--muted);margin-top:3px}
.kvg{color:var(--green)}.kvr{color:var(--red)}.kvo{color:var(--accent-dark)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.panel{background:var(--white);border:1px solid var(--border)}
.ph{padding:12px 18px;border-bottom:1px solid var(--border);background:var(--cream);display:flex;justify-content:space-between;align-items:center}
.pht{font-size:8px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase}
.phh{font-size:8px;color:var(--muted)}
.pb{padding:14px 18px}
.brow{display:flex;align-items:center;gap:8px;margin-bottom:9px;cursor:pointer}
.bname{font-size:10px;font-weight:700;width:140px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btrack{flex:1;height:5px;background:var(--cream);overflow:hidden}
.bfill{height:100%;transition:width .4s}
.bf0{background:var(--ink)}.bf1{background:var(--green)}.bf2{background:var(--red)}.bf3{background:var(--accent)}
.bmeta{font-size:9px;color:var(--muted);width:50px;text-align:right;flex-shrink:0}
.rrow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--cream)}
.rrow:last-child{border-bottom:none}
.rname{font-size:11px;font-weight:700}
.rdet{font-size:9px;color:var(--muted)}
.rup{font-size:11px;font-weight:700}
.rpos{color:var(--green)}.rneg{color:var(--red)}
/* FILTER BAR */
.fbar{background:var(--white);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;flex-shrink:0;position:sticky;top:0;z-index:10}
.fl{font-size:8px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
select.fs{font-family:inherit;font-size:10px;font-weight:700;background:var(--cream);border:1px solid var(--border);padding:5px 8px;cursor:pointer;outline:none}
select.fs:focus{border-color:var(--ink)}
.chips{display:flex;gap:5px}
.chip{font-family:inherit;font-size:8px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:3px 9px;border:1px solid var(--border);cursor:pointer;background:var(--white);transition:all .12s;border-radius:20px}
.chip:hover{border-color:var(--ink)}
.chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.q1on{background:var(--green)!important;border-color:var(--green)!important;color:#fff!important}
.q2on{background:#2980b9!important;border-color:#2980b9!important;color:#fff!important}
.q3on{background:var(--accent-dark)!important;border-color:var(--accent-dark)!important;color:#fff!important}
.q4on{background:var(--red)!important;border-color:var(--red)!important;color:#fff!important}
.sep{width:1px;height:18px;background:var(--border);flex-shrink:0}
input.srch{font-family:inherit;font-size:10px;background:var(--cream);border:1px solid var(--border);padding:5px 10px;outline:none;width:180px}
input.srch:focus{border-color:var(--ink)}
.rcnt{font-size:9px;color:var(--muted);margin-left:auto;white-space:nowrap}
/* TABLE */
.twrap{padding:0 28px 28px}
table.ut{width:100%;border-collapse:collapse;margin-top:14px}
table.ut thead tr{border-bottom:2px solid var(--ink)}
table.ut th{font-size:8px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);padding:7px 10px;text-align:left;white-space:nowrap}
table.ut th.r{text-align:right}
table.ut tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
table.ut tbody tr:hover{background:var(--cream)}
table.ut td{padding:9px 10px;vertical-align:middle}
.tn{font-size:11px;font-weight:700}
.ti{font-size:9px;color:var(--muted);margin-top:1px}
.tsm{font-size:9px;color:var(--muted)}
.qb{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:2px}
.q1{background:#d4edda;color:#1e7e4a}.q2{background:#d0e8f5;color:#1a6a9a}
.q3{background:#fef3cd;color:#856404}.q4{background:#f8d7da;color:#842029}
.q0{background:var(--cream);color:var(--muted)}
.uv{font-size:11px;font-weight:700}
.uhi{color:var(--green)}.umed{color:var(--accent-dark)}.ulo{color:var(--muted)}.uneg{color:var(--red)}
.rb{font-size:8px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:2px 7px;border-radius:2px}
.rhi{background:#f8d7da;color:#842029}.rme{background:#fef3cd;color:#856404}.rlo{background:#d4edda;color:#1e7e4a}
.fg{display:inline-block;font-size:7px;font-weight:700;padding:2px 5px;background:#f0ebff;color:#6d28d9;margin-right:3px;border-radius:2px}
.fgr{background:#f8d7da;color:#842029}
th button.srt{font-family:inherit;font-size:8px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;background:none;border:none;color:var(--muted);cursor:pointer}
th button.srt.on{color:var(--ink)}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(13,13,13,.6);z-index:100;display:flex;justify-content:flex-end}
.modal{width:480px;height:100%;background:var(--paper);overflow-y:auto;border-left:1px solid var(--border)}
.mhdr{background:var(--ink);color:var(--paper);padding:22px 26px;position:sticky;top:0;z-index:1}
.mclose{font-family:inherit;font-size:8px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;background:none;border:none;color:#666;cursor:pointer;margin-bottom:14px;display:block;transition:color .15s}
.mclose:hover{color:var(--accent)}
.mtag{font-size:8px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
.mname{font-size:26px;font-weight:700;line-height:1.1;margin-bottom:3px}
.misin{font-size:9px;color:#666;letter-spacing:0.1em}
.mbody{padding:24px}
.msec{margin-bottom:22px}
.mst{font-size:8px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.mmetrics{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mmet{background:var(--white);border:1px solid var(--border);padding:11px 13px}
.mml{font-size:8px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.mmv{font-size:17px;font-weight:700}
.mmg{color:var(--green)}.mmr{color:var(--red)}.mmo{color:var(--accent-dark)}
.qr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--cream)}
.qr:last-child{border-bottom:none}
.qk{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em}
.qv{font-size:10px;font-weight:700}
.fglg{display:inline-block;font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:3px 10px;background:#f8d7da;color:#842029;margin-right:5px;margin-bottom:5px;border-radius:2px}
.fglg.w{background:#fef3cd;color:#856404}
.empty{text-align:center;padding:70px 20px;color:var(--muted)}
.eico{font-size:28px;margin-bottom:10px}
.emsg{font-size:9px;letter-spacing:0.12em;text-transform:uppercase}
</style>
</head>
<body>
<div id="app">
  <header class="header">
    <div class="brand">MIRABAUD <span>HC Lab</span></div>
    <nav class="nav" id="nav" style="display:none">
      <button onclick="showView('macro')" id="btn-macro">Macro View</button>
      <button onclick="showView('screen')" id="btn-screen">Universe Screen</button>
      <button onclick="reset()" style="color:#555!important">&#8635; Reset</button>
    </nav>
  </header>
  <div class="main" id="main"></div>
</div>
<script>
var raw={hc:null,quant:null,qual:null};
var enriched=[];
var currentView='upload';
var sortState={field:'upside',dir:'desc'};
var filters={search:'',region:'All',sector:'All',quants:[],risk:'All'};
 
function cN(v){
  if(!v||v=='—'||v=='-'||v=='#N/A'||v=='N/A')return null;
  var n=parseFloat(String(v).replace(/[€$£%\s,]/g,''));
  return isNaN(n)?null:n;
}
function mapRegion(r){
  var v=String(r||'').toUpperCase();
  if(/US|NORTH AMERICA|USA|CANADA/.test(v))return 'North America';
  if(/EUROPE|UK|\bCH\b|FR\b|EU\b|GERMANY|SUISSE|SWISS/.test(v))return 'Europe';
  if(/ASIA|JAPAN|CHINA|EMERGING|LATAM/.test(v))return 'Emerging Markets';
  return 'Other';
}
function parseCSV(text){
  var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
  if(lines.length<2)return[];
  var sep=lines[0].indexOf(';')>-1?';':',';
  var headers=lines[0].split(sep).map(function(h){return h.trim().toLowerCase().replace(/['"]/g,'');});
  return lines.slice(1).map(function(line){
    var cols=line.split(sep);
    return headers.reduce(function(acc,h,i){
      acc[h]=(cols[i]||'').trim().replace(/^["']|["']$/g,'');
      return acc;
    },{});
  }).filter(function(r){return Object.values(r).some(function(v){return v;});});
}
function pct(v,d){d=d||1;return v!==null?(v*100).toFixed(d)+'%':'—';}
function uCls(u){
  if(u===null)return'';
  if(u>=.20)return'uhi';if(u>=.10)return'umed';if(u>=0)return'ulo';return'uneg';
}
function qCls(q){return['q0','q1','q2','q3','q4'][q]||'q0';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
 
function handleFile(key,inp){
  var file=inp.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){raw[key]=parseCSV(e.target.result);renderUpload();};
  reader.readAsText(file);
}
function runFusion(){
  if(!raw.hc||!raw.quant)return;
  enriched=raw.hc.map(function(s){
    var isin=String(s.id_isin||s.isin||'').toLowerCase().trim();
    var q=raw.quant.find(function(x){return String(x.id_isin||x.isin||'').toLowerCase().trim()===isin;})||{};
    var l=raw.qual?(raw.qual.find(function(x){return String(x.id_isin||x.isin||'').toLowerCase().trim()===isin;})||{}): {};
    var upside=cN(s['upside downside']||s['upside/downside']||s['upside']||s['upside (%)'||null]);
    var qRank=parseInt(q['combined quartile']||q['quartile']||q['quant quartile']||0)||0;
    var stopSignal=q['stop loss signal']||q['stop loss']||'';
    var pe=cN(s['forward pe']||s['forward p/e']||s['fwd pe']||null);
    var flags=[];
    if(upside!==null&&upside<0.08)flags.push('Low Upside');
    if(qRank>=4)flags.push('Quant Q4');
    if(stopSignal.toLowerCase().indexOf('stop')>-1)flags.push('Stop Loss');
    if(pe&&pe>35)flags.push('Stretched P/E');
    return{
      id_isin:s.id_isin||s.isin||'',
      name:s['company name']||s['company']||s['name']||'N/A',
      region:mapRegion(s['region']||s['geography']||''),
      sector:s['sector name']||s['sector']||s['gics sector']||'Other',
      upside:upside,qRank:qRank,
      pe:s['forward pe']||s['forward p/e']||s['fwd pe']||'',
      price:s['last price']||s['price']||'',
      target:s['price target (1)']||s['price target']||s['target price']||'',
      stopLoss:stopSignal,
      tech:q['short term technical']||q['technical']||'',
      overall:l['overall rating']||l['overall']||'',
      moat:l['moat']||'',mgmt:l['management quality']||l['management']||'',
      flags:flags,
      risk:flags.length>=2?'high':flags.length===1?'medium':'low'
    };
  });
  showView('macro');
}
function showView(v){
  currentView=v;
  var nav=document.getElementById('nav');
  nav.style.display=enriched.length?'flex':'none';
  ['macro','screen'].forEach(function(id){
    var b=document.getElementById('btn-'+id);
    if(b)b.classList.toggle('active',id===v);
  });
  var main=document.getElementById('main');
  if(v==='upload'){renderUpload();return;}
  if(v==='macro'){main.innerHTML=buildMacro();return;}
  if(v==='screen'){buildScreen();return;}
}
function reset(){
  raw={hc:null,quant:null,qual:null};enriched=[];
  filters={search:'',region:'All',sector:'All',quants:[],risk:'All'};
  showView('upload');
}
 
/* UPLOAD */
function renderUpload(){
  var cards=[
    {key:'hc',tag:'HC Data',title:'High Conviction',desc:'ISIN, Company Name, Region, Sector, Price, Target, Upside, Fwd P/E'},
    {key:'quant',tag:'Quant',title:'Quantitatif',desc:'ISIN, Combined Quartile, Stop Loss Signal, Short Term Technical'},
    {key:'qual',tag:'Qual',title:'Fondamental',desc:'ISIN, Overall Rating, Moat, Management Quality (optionnel)'},
  ];
  var ch=cards.map(function(c){return(
    '<div class="ucard'+(raw[c.key]?' loaded':'')+'">'+
    '<div class="ctag">'+c.tag+'</div>'+
    '<div class="ctitle">'+c.title+'</div>'+
    '<div class="cdesc">'+c.desc+'</div>'+
    '<div class="cstatus '+(raw[c.key]?'ok':'pend')+'">'+
    (raw[c.key]?'&#10003; '+raw[c.key].length+' lignes':'— En attente')+
    '</div>'+
    '<label class="flabel" for="fi-'+c.key+'">'+(raw[c.key]?'Remplacer':'Charger CSV')+
    '<input type="file" id="fi-'+c.key+'" accept=".csv,.txt" onchange="handleFile(\''+c.key+'\',this)"></label>'+
    '</div>');
  }).join('');
  document.getElementById('main').innerHTML=
    '<div class="upload-wrap">'+
    '<div style="font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--accent-dark);margin-bottom:8px">Mirabaud HC Lab</div>'+
    '<div class="upload-title">Investment Universe<br>Screening Tool</div>'+
    '<div class="upload-sub">Macro &rarr; Micro &middot; 3 fichiers CSV Bloomberg</div>'+
    '<div class="upload-grid">'+ch+'</div>'+
    '<button class="run-btn"'+(raw.hc&&raw.quant?'':' disabled')+' onclick="runFusion()">'+
    (raw.hc&&raw.quant?'&rarr; Lancer la fusion':'Charger HC + Quant pour continuer')+
    '</button>'+
    (!raw.qual&&raw.hc?'<p style="margin-top:10px;font-size:9px;color:var(--muted)">Fichier Qual optionnel.</p>':'')+
    '</div>';
}
 
/* MACRO */
function buildMacro(){
  var total=enriched.length;
  var hi=enriched.filter(function(s){return s.risk==='high';}).length;
  var me=enriched.filter(function(s){return s.risk==='medium';}).length;
  var lo=enriched.filter(function(s){return s.risk==='low';}).length;
  var q1=enriched.filter(function(s){return s.qRank===1;}).length;
  var avgUp=total?enriched.reduce(function(a,s){return a+(s.upside||0);},0)/total:null;
 
  var regMap={};
  enriched.forEach(function(s){
    if(!regMap[s.region])regMap[s.region]={count:0,upside:0,highRisk:0};
    regMap[s.region].count++;regMap[s.region].upside+=(s.upside||0);
    if(s.risk==='high')regMap[s.region].highRisk++;
  });
  var regions=Object.entries(regMap).map(function(e){
    return{name:e[0],count:e[1].count,highRisk:e[1].highRisk,avgUpside:e[1].count?e[1].upside/e[1].count:null};
  }).sort(function(a,b){return b.count-a.count;});
 
  var secMap={};
  enriched.forEach(function(s){
    if(!secMap[s.sector])secMap[s.sector]={count:0,upside:0,highRisk:0};
    secMap[s.sector].count++;secMap[s.sector].upside+=(s.upside||0);
    if(s.risk==='high')secMap[s.sector].highRisk++;
  });
  var sectors=Object.entries(secMap).map(function(e){
    return{name:e[0],count:e[1].count,highRisk:e[1].highRisk,avgUpside:e[1].count?e[1].upside/e[1].count:null};
  }).sort(function(a,b){return b.count-a.count;});
  var maxC=Math.max.apply(null,sectors.map(function(s){return s.count;}),1)||1;
 
  var kpis='<div class="kpi-row">'+
    '<div class="kpi"><div class="kpi-lbl">Univers</div><div class="kpi-val">'+total+'</div><div class="kpi-sub">Titres</div></div>'+
    '<div class="kpi"><div class="kpi-lbl">Upside Moyen</div><div class="kpi-val '+(avgUp>0?'kvg':'kvr')+'">'+pct(avgUp)+'</div><div class="kpi-sub">Consensus</div></div>'+
    '<div class="kpi"><div class="kpi-lbl">Q1 Quant</div><div class="kpi-val kvg">'+q1+'</div><div class="kpi-sub">'+(total?((q1/total)*100).toFixed(0):0)+'% univers</div></div>'+
    '<div class="kpi"><div class="kpi-lbl">High Risk</div><div class="kpi-val kvr">'+hi+'</div><div class="kpi-sub">'+(total?((hi/total)*100).toFixed(0):0)+'% univers</div></div>'+
    '<div class="kpi"><div class="kpi-lbl">Secteurs</div><div class="kpi-val kvo">'+sectors.length+'</div><div class="kpi-sub">'+regions.length+' régions</div></div>'+
    '</div>';
 
  var regH=regions.map(function(r){return(
    '<div class="rrow"><div><div class="rname">'+esc(r.name)+'</div><div class="rdet">'+r.count+' titres &middot; '+r.highRisk+' high risk</div></div>'+
    '<div class="rup '+(r.avgUpside>0?'rpos':'rneg')+'">'+pct(r.avgUpside)+'</div></div>');
  }).join('');
 
  var riskB=[
    {lbl:'High Risk',cnt:hi,cls:'bf2'},{lbl:'Medium',cnt:me,cls:'bf3'},{lbl:'Clean',cnt:lo,cls:'bf1'}
  ].map(function(r){return(
    '<div class="brow"><span class="bname">'+r.lbl+'</span>'+
    '<div class="btrack"><div class="bfill '+r.cls+'" style="width:'+(total?(r.cnt/total*100):0)+'%"></div></div>'+
    '<span class="bmeta">'+r.cnt+' '+(total?'('+((r.cnt/total)*100).toFixed(0)+'%)':'')+' </span></div>');
  }).join('');
 
  var qB=[1,2,3,4].map(function(q){
    var cnt=enriched.filter(function(s){return s.qRank===q;}).length;
    return '<div class="brow"><span class="bname"><span class="qb q'+q+'">Q'+q+'</span></span>'+
      '<div class="btrack"><div class="bfill '+(q===1?'bf1':q===4?'bf2':'bf3')+'" style="width:'+(total?(cnt/total*100):0)+'%"></div></div>'+
      '<span class="bmeta">'+cnt+'</span></div>';
  }).join('');
 
  var secR=sectors.map(function(s){return(
    '<div class="brow" onclick="drillSector(\''+esc(s.name)+'\')" title="Drill: '+esc(s.name)+'">'+
    '<span class="bname" style="font-size:11px;font-weight:700">'+esc(s.name)+'</span>'+
    '<div class="btrack"><div class="bfill bf0" style="width:'+(s.count/maxC*100)+'%"></div></div>'+
    '<span class="bmeta" style="width:80px">'+s.count+' &middot; <span style="color:var(--red)">'+s.highRisk+'&#9873;</span></span>'+
    '<span style="font-size:10px;font-weight:700;width:55px;text-align:right;color:'+(s.avgUpside>0?'var(--green)':'var(--red)')+'">'+pct(s.avgUpside)+'</span>'+
    '</div>');
  }).join('');
 
  return '<div class="macro-wrap">'+kpis+
    '<div class="two-col">'+
    '<div class="panel"><div class="ph"><span class="pht">Par R&eacute;gion</span><span class="phh">Upside moyen &rarr;</span></div><div class="pb">'+regH+'</div></div>'+
    '<div class="panel"><div class="ph"><span class="pht">Risk Overview</span></div><div class="pb">'+riskB+
    '<div style="border-top:1px solid var(--border);margin-top:14px;padding-top:14px"><div class="pht" style="margin-bottom:10px">Distribution Quant</div>'+qB+'</div></div></div>'+
    '</div>'+
    '<div class="panel"><div class="ph"><span class="pht">Par Secteur &mdash; cliquer pour drill down</span><span class="phh">Count &middot; &#9873; High Risk &middot; Upside moyen</span></div><div class="pb">'+secR+'</div></div>'+
    '</div>';
}
 
function drillSector(s){filters.sector=s;showView('screen');}
 
/* SCREEN */
function buildScreen(){
  var regions=['All'].concat(Array.from(new Set(enriched.map(function(s){return s.region;}))).sort());
  var sectors=['All'].concat(Array.from(new Set(enriched.map(function(s){return s.sector;}))).sort());
 
  var regOpts=regions.map(function(r){return'<option'+(r===filters.region?' selected':'')+'>'+esc(r)+'</option>';}).join('');
  var secOpts=sectors.map(function(s){return'<option'+(s===filters.sector?' selected':'')+'>'+esc(s)+'</option>';}).join('');
 
  var qChips=[1,2,3,4].map(function(q){
    var on=filters.quants.indexOf(q)>-1;
    return'<button class="chip'+(on?' q'+q+'on':'')+'" onclick="toggleQ('+q+')" id="qc'+q+'">Q'+q+'</button>';
  }).join('');
 
  var rChips=['All','low','medium','high'].map(function(r){
    var lbl=r==='All'?'Tous':r.charAt(0).toUpperCase()+r.slice(1);
    return'<button class="chip'+(filters.risk===r?' on':'')+'" onclick="setRisk(\''+r+'\')">'+lbl+'</button>';
  }).join('');
 
  // Filter
  var data=enriched;
  if(filters.search){var q=filters.search.toLowerCase();data=data.filter(function(s){return s.name.toLowerCase().indexOf(q)>-1||s.id_isin.toLowerCase().indexOf(q)>-1;});}
  if(filters.region!=='All')data=data.filter(function(s){return s.region===filters.region;});
  if(filters.sector!=='All')data=data.filter(function(s){return s.sector===filters.sector;});
  if(filters.quants.length>0)data=data.filter(function(s){return filters.quants.indexOf(s.qRank)>-1;});
  if(filters.risk!=='All')data=data.filter(function(s){return s.risk===filters.risk;});
 
  // Sort
  var dir=sortState.dir==='asc'?1:-1;
  data=data.slice().sort(function(a,b){
    if(sortState.field==='name')return dir*a.name.localeCompare(b.name);
    if(sortState.field==='upside')return dir*((a.upside!=null?a.upside:-999)-(b.upside!=null?b.upside:-999));
    if(sortState.field==='qRank')return dir*((a.qRank||9)-(b.qRank||9));
    if(sortState.field==='pe')return dir*((cN(a.pe)||9999)-(cN(b.pe)||9999));
    return 0;
  });
  window._sd=data;
 
  function arr(f){if(sortState.field!==f)return'<span style="opacity:.3">&updownarrow;</span>';return sortState.dir==='asc'?'&#8593;':'&#8595;';}
  function sh(f,lbl){return'<button class="srt'+(sortState.field===f?' on':'')+'" onclick="setSort(\''+f+'\')">'+lbl+' '+arr(f)+'</button>';}
 
  var rows=data.length===0?
    '<tr><td colspan="8"><div class="empty"><div class="eico">&#8709;</div><div class="emsg">Aucun titre ne correspond aux filtres</div></div></td></tr>':
    data.map(function(s,i){
      var flags=s.flags.map(function(f){return'<span class="fg'+(f.indexOf('Stop')>-1?' fgr':'')+'">'+ esc(f)+'</span>';}).join('');
      return'<tr onclick="openModal('+i+')">'+
        '<td><div class="tn">'+esc(s.name)+'</div><div class="ti">'+esc(s.id_isin)+'</div></td>'+
        '<td><span class="tsm">'+esc(s.region)+'</span></td>'+
        '<td><span class="tsm">'+esc(s.sector)+'</span></td>'+
        '<td style="text-align:center"><span class="qb '+qCls(s.qRank)+'">'+(s.qRank?'Q'+s.qRank:'—')+'</span></td>'+
        '<td style="text-align:right"><span class="uv '+uCls(s.upside)+'">'+(s.upside!==null?pct(s.upside):'—')+'</span></td>'+
        '<td style="text-align:right;font-weight:700;font-size:11px">'+(cN(s.pe)?parseFloat(s.pe).toFixed(1)+'x':'—')+'</td>'+
        '<td><span class="rb '+(s.risk==='high'?'rhi':s.risk==='medium'?'rme':'rlo')+'">'+s.risk+'</span></td>'+
        '<td>'+flags+'</td>'+
        '</tr>';
    }).join('');
 
  document.getElementById('main').innerHTML=
    '<div class="fbar">'+
    '<input class="srch" placeholder="Chercher ISIN / Nom..." value="'+esc(filters.search)+'" oninput="setSearch(this.value)">'+
    '<div class="sep"></div>'+
    '<span class="fl">R&eacute;gion</span><select class="fs" onchange="setRegion(this.value)">'+regOpts+'</select>'+
    '<span class="fl">Secteur</span><select class="fs" onchange="setSector(this.value)">'+secOpts+'</select>'+
    '<div class="sep"></div>'+
    '<span class="fl">Quant Q</span><div class="chips">'+qChips+'</div>'+
    '<div class="sep"></div>'+
    '<span class="fl">Risque</span><div class="chips">'+rChips+'</div>'+
    '<span class="rcnt">'+data.length+' / '+enriched.length+' titres</span>'+
    '</div>'+
    '<div class="twrap"><table class="ut"><thead><tr>'+
    '<th>'+sh('name','Titre')+'</th>'+
    '<th>R&eacute;gion</th><th>Secteur</th>'+
    '<th style="text-align:center">'+sh('qRank','Q Quant')+'</th>'+
    '<th style="text-align:right">'+sh('upside','Upside %')+'</th>'+
    '<th style="text-align:right">'+sh('pe','Fwd P/E')+'</th>'+
    '<th>Risque</th><th>Flags</th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table></div>';
}
 
function setSearch(v){filters.search=v;buildScreen();}
function setRegion(v){filters.region=v;buildScreen();}
function setSector(v){filters.sector=v;buildScreen();}
function setRisk(v){filters.risk=v;buildScreen();}
function toggleQ(q){
  var idx=filters.quants.indexOf(q);
  if(idx>-1)filters.quants.splice(idx,1);else filters.quants.push(q);
  buildScreen();
}
function setSort(f){
  sortState=sortState.field===f?{field:f,dir:sortState.dir==='asc'?'desc':'asc'}:{field:f,dir:'desc'};
  buildScreen();
}
 
/* MODAL */
function openModal(i){
  var s=window._sd[i];if(!s)return;
  var qual='';
  if(s.overall||s.moat||s.mgmt){
    qual='<div class="msec"><div class="mst">Qualitatif</div>'+
    (s.overall?'<div class="qr"><span class="qk">Overall Rating</span><span class="qv">'+esc(s.overall)+'</span></div>':'')+
    (s.moat?'<div class="qr"><span class="qk">Moat</span><span class="qv">'+esc(s.moat)+'</span></div>':'')+
    (s.mgmt?'<div class="qr"><span class="qk">Management</span><span class="qv">'+esc(s.mgmt)+'</span></div>':'')+
    '</div>';
  }
  var flagH=s.flags.length?'<div style="margin-top:10px">'+s.flags.map(function(f){
    return'<span class="fglg'+(f.indexOf('Low')>-1||f.indexOf('Stretched')>-1?' w':'')+'">'+ esc(f)+'</span>';
  }).join('')+'</div>':'';
  var stopColor=s.stopLoss&&s.stopLoss.toUpperCase().indexOf('STOP')>-1?'color:var(--red)':'';
  var el=document.createElement('div');
  el.className='overlay';el.id='modal';
  el.onclick=function(e){if(e.target===el)closeModal();};
  el.innerHTML=
    '<div class="modal">'+
    '<div class="mhdr">'+
    '<button class="mclose" onclick="closeModal()">&#10005; Fermer</button>'+
    '<div class="mtag">'+esc(s.region)+' &middot; '+esc(s.sector)+'</div>'+
    '<div class="mname">'+esc(s.name)+'</div>'+
    '<div class="misin">'+esc(s.id_isin)+'</div>'+
    '</div>'+
    '<div class="mbody">'+
    '<div class="msec"><div class="mst">Prix &amp; Consensus</div>'+
    '<div class="mmetrics">'+
    '<div class="mmet"><div class="mml">Dernier Prix</div><div class="mmv">'+(esc(s.price)||'—')+'</div></div>'+
    '<div class="mmet"><div class="mml">Target Price</div><div class="mmv mmo">'+(esc(s.target)||'—')+'</div></div>'+
    '<div class="mmet"><div class="mml">Upside / Downside</div><div class="mmv '+(s.upside>0?'mmg':'mmr')+'">'+(s.upside!==null?pct(s.upside):'—')+'</div></div>'+
    '<div class="mmet"><div class="mml">Forward P/E</div><div class="mmv">'+(cN(s.pe)?parseFloat(s.pe).toFixed(1)+'x':'—')+'</div></div>'+
    '</div></div>'+
    '<div class="msec"><div class="mst">Quantitatif</div>'+
    '<div class="qr"><span class="qk">Quartile</span><span class="qb '+qCls(s.qRank)+'">'+(s.qRank?'Q'+s.qRank:'—')+'</span></div>'+
    '<div class="qr"><span class="qk">Stop Loss Signal</span><span class="qv" style="'+stopColor+'">'+(esc(s.stopLoss)||'—')+'</span></div>'+
    '<div class="qr"><span class="qk">Technique ST</span><span class="qv">'+(esc(s.tech)||'—')+'</span></div>'+
    '</div>'+
    qual+
    '<div class="msec"><div class="mst">Audit Risque</div>'+
    '<div class="qr"><span class="qk">Niveau</span><span class="rb '+(s.risk==='high'?'rhi':s.risk==='medium'?'rme':'rlo')+'">'+s.risk+'</span></div>'+
    flagH+'</div>'+
    '</div></div>';
  document.body.appendChild(el);
}
function closeModal(){var m=document.getElementById('modal');if(m)m.remove();}
 
renderUpload();
</script>
</body>
</html>
