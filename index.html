<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirabaud HC | Investment Universe</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0d0d0d;
      --paper: #f5f2ec;
      --cream: #ede9e0;
      --accent: #c8a84b;
      --accent-dark: #9a7a28;
      --muted: #888;
      --red: #c0392b;
      --green: #1e7e4a;
      --border: #d8d2c4;
      --mono: 'IBM Plex Mono', monospace;
      --serif: 'Instrument Serif', Georgia, serif;
    }

    html, body { height: 100%; background: var(--paper); color: var(--ink); font-family: var(--mono); font-size: 13px; }

    /* LAYOUT */
    #root { display: flex; flex-direction: column; height: 100vh; }

    /* HEADER */
    .header {
      background: var(--ink);
      color: var(--paper);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      border-bottom: 2px solid var(--accent);
    }
    .header-brand { display: flex; align-items: baseline; gap: 10px; }
    .header-brand h1 { font-family: var(--serif); font-style: italic; font-size: 20px; letter-spacing: 0.02em; color: var(--paper); }
    .header-brand span { font-size: 9px; font-weight: 700; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); }
    .header-nav { display: flex; gap: 28px; align-items: center; }
    .nav-btn {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      padding: 4px 0;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .nav-btn.active, .nav-btn:hover { color: var(--accent); border-bottom-color: var(--accent); }

    /* MAIN */
    .main { flex: 1; overflow-y: auto; }

    /* UPLOAD */
    .upload-page {
      max-width: 760px;
      margin: 80px auto;
      padding: 0 24px;
    }
    .upload-title {
      font-family: var(--serif);
      font-style: italic;
      font-size: 42px;
      line-height: 1.1;
      margin-bottom: 8px;
    }
    .upload-subtitle { font-size: 10px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 48px; }
    .upload-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 32px; }
    .upload-card {
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 24px;
      background: white;
      transition: border-color 0.2s;
    }
    .upload-card.loaded { border-color: var(--accent); background: #fdf9ef; }
    .upload-card-label { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .upload-card-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .upload-card-desc { font-size: 10px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
    .upload-card-status { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; margin-bottom: 12px; }
    .status-ok { color: var(--green); }
    .status-pending { color: var(--muted); }
    .file-input-label {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 1px solid var(--ink);
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .file-input-label:hover { background: var(--ink); color: var(--paper); }
    .file-input { display: none; }
    .run-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: var(--ink);
      color: var(--paper);
      border: none;
      padding: 14px 32px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .run-btn:hover { background: var(--accent-dark); }
    .run-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* MACRO DASHBOARD */
    .dashboard { padding: 32px; }
    .kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 28px; }
    .kpi-card {
      background: white;
      border: 1px solid var(--border);
      padding: 18px 20px;
      border-radius: 4px;
    }
    .kpi-label { font-size: 8px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .kpi-value { font-size: 26px; font-weight: 700; line-height: 1; }
    .kpi-sub { font-size: 9px; color: var(--muted); margin-top: 4px; }
    .kpi-value.green { color: var(--green); }
    .kpi-value.red { color: var(--red); }
    .kpi-value.gold { color: var(--accent-dark); }

    .section-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .panel {
      background: white;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .panel-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--cream);
    }
    .panel-title { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; }
    .panel-body { padding: 16px 20px; }

    /* BAR CHARTS */
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .bar-name { font-size: 10px; font-weight: 700; width: 130px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { flex: 1; height: 6px; background: var(--cream); border-radius: 0; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--ink); border-radius: 0; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
    .bar-fill.accent { background: var(--accent); }
    .bar-fill.red { background: var(--red); }
    .bar-fill.green { background: var(--green); }
    .bar-meta { font-size: 9px; color: var(--muted); width: 60px; text-align: right; flex-shrink: 0; }

    /* REGION MAP */
    .region-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--cream);
      cursor: pointer;
      transition: background 0.1s;
    }
    .region-row:last-child { border-bottom: none; }
    .region-row:hover { padding-left: 6px; }
    .region-name { font-size: 11px; font-weight: 700; }
    .region-count { font-size: 9px; color: var(--muted); }
    .region-upside { font-size: 11px; font-weight: 700; }
    .region-upside.pos { color: var(--green); }
    .region-upside.neg { color: var(--red); }

    /* RISK DONUT */
    .risk-summary { display: flex; gap: 20px; align-items: center; }
    .risk-bars { flex: 1; }
    .risk-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .risk-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .risk-label { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; flex: 1; }
    .risk-pct { font-size: 11px; font-weight: 700; }

    /* SECTOR DETAIL */
    .sector-detail { margin-top: 20px; }

    /* FILTERS BAR */
    .filters-bar {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 12px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .filter-group { display: flex; align-items: center; gap: 8px; }
    .filter-label { font-size: 8px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
    .filter-select {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 700;
      background: var(--cream);
      border: 1px solid var(--border);
      padding: 5px 10px;
      border-radius: 2px;
      cursor: pointer;
      outline: none;
    }
    .filter-select:focus { border-color: var(--ink); }
    .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      background: white;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .chip.q1.active { background: var(--green); border-color: var(--green); }
    .chip.q2.active { background: #2980b9; border-color: #2980b9; }
    .chip.q3.active { background: var(--accent-dark); border-color: var(--accent-dark); }
    .chip.q4.active { background: var(--red); border-color: var(--red); }
    .search-input {
      font-family: var(--mono);
      font-size: 10px;
      background: var(--cream);
      border: 1px solid var(--border);
      padding: 5px 12px;
      border-radius: 2px;
      outline: none;
      width: 200px;
    }
    .search-input:focus { border-color: var(--ink); }
    .filter-divider { width: 1px; height: 20px; background: var(--border); }
    .results-count { font-size: 9px; color: var(--muted); margin-left: auto; }

    /* TABLE */
    .table-wrap { padding: 0 32px 32px; }
    .universe-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    .universe-table thead tr { border-bottom: 2px solid var(--ink); }
    .universe-table th {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 8px 12px;
      text-align: left;
      white-space: nowrap;
    }
    .universe-table th.right { text-align: right; }
    .universe-table th.center { text-align: center; }
    .universe-table tbody tr {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    .universe-table tbody tr:hover { background: var(--cream); }
    .universe-table td { padding: 10px 12px; vertical-align: middle; }
    .td-name { font-size: 11px; font-weight: 700; }
    .td-isin { font-size: 9px; color: var(--muted); margin-top: 1px; }
    .td-sector { font-size: 9px; color: var(--muted); }
    .td-region { font-size: 9px; }
    .q-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 2px;
      font-family: var(--mono);
    }
    .q1 { background: #d4edda; color: #1e7e4a; }
    .q2 { background: #d0e8f5; color: #1a6a9a; }
    .q3 { background: #fef3cd; color: #856404; }
    .q4 { background: #f8d7da; color: #842029; }
    .q0 { background: var(--cream); color: var(--muted); }
    .upside-val { font-size: 11px; font-weight: 700; text-align: right; }
    .upside-high { color: var(--green); }
    .upside-med { color: var(--accent-dark); }
    .upside-low { color: var(--muted); }
    .upside-neg { color: var(--red); }
    .risk-badge {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 2px;
    }
    .risk-high { background: #f8d7da; color: #842029; }
    .risk-medium { background: #fef3cd; color: #856404; }
    .risk-low { background: #d4edda; color: #1e7e4a; }
    .flag-list { display: flex; gap: 4px; flex-wrap: wrap; }
    .flag {
      font-size: 7px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 2px 6px;
      background: #f0ebff;
      color: #6d28d9;
      border-radius: 2px;
    }
    .flag.red { background: #f8d7da; color: #842029; }

    /* SORT ARROW */
    .sort-btn { background: none; border: none; cursor: pointer; font-family: var(--mono); font-size: 8px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 4px; }
    .sort-btn.active { color: var(--ink); }
    .sort-arrow { opacity: 0.4; }
    .sort-btn.active .sort-arrow { opacity: 1; }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(13,13,13,0.6);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      justify-content: flex-end;
    }
    .modal-panel {
      width: 520px;
      height: 100%;
      background: var(--paper);
      overflow-y: auto;
      border-left: 1px solid var(--border);
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .modal-header {
      background: var(--ink);
      color: var(--paper);
      padding: 24px 28px;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .modal-close {
      font-size: 8px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
      background: none; border: none; color: #888; cursor: pointer; margin-bottom: 16px;
      transition: color 0.15s;
    }
    .modal-close:hover { color: var(--accent); }
    .modal-region-tag {
      font-size: 8px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 6px;
    }
    .modal-name { font-family: var(--serif); font-style: italic; font-size: 32px; line-height: 1.1; margin-bottom: 4px; }
    .modal-isin { font-size: 9px; color: #888; letter-spacing: 0.1em; }
    .modal-body { padding: 28px; }
    .modal-section { margin-bottom: 28px; }
    .modal-section-title { font-size: 8px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .modal-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-metric { background: white; border: 1px solid var(--border); padding: 12px 14px; border-radius: 2px; }
    .modal-metric-label { font-size: 8px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .modal-metric-val { font-size: 18px; font-weight: 700; }
    .modal-metric-val.gold { color: var(--accent-dark); }
    .modal-metric-val.green { color: var(--green); }
    .modal-metric-val.red { color: var(--red); }
    .qual-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--cream); }
    .qual-row:last-child { border-bottom: none; }
    .qual-key { font-size: 9px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .qual-val { font-size: 10px; font-weight: 700; }
    .flags-section { display: flex; gap: 6px; flex-wrap: wrap; }
    .flag-large {
      font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 4px 12px; border-radius: 2px;
      background: #f8d7da; color: #842029;
    }
    .flag-large.warn { background: #fef3cd; color: #856404; }

    /* EMPTY */
    .empty { text-align: center; padding: 80px 20px; color: var(--muted); }
    .empty-icon { font-size: 32px; margin-bottom: 12px; }
    .empty-msg { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--cream); }
    ::-webkit-scrollbar-thumb { background: var(--border); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useCallback } = React;

const THR = { LOW_UPSIDE: 0.08, STRETCHED_PE: 35, Q_WARN: 4 };

const cN = (v) => {
  if (!v || v === "—" || v === "-" || v === "#N/A" || v === "N/A") return null;
  const n = parseFloat(String(v).replace(/[€$£%\s,]/g, ""));
  return isNaN(n) ? null : n;
};

const mapRegion = (r) => {
  const val = String(r || "").toUpperCase();
  if (val.includes("US") || val.includes("NORTH AMERICA") || val.includes("USA") || val.includes("CANADA")) return "North America";
  if (val.includes("EUROPE") || val.includes("UK") || val.includes("CH") || val.includes("FR") || val.includes("EU") || val.includes("GERMANY") || val.includes("SUISSE")) return "Europe";
  if (val.includes("ASIA") || val.includes("JAPAN") || val.includes("CHINA") || val.includes("EMERGING") || val.includes("LATAM")) return "Emerging Markets";
  return "Other";
};

const parseCSV = (text) => {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return [];
  const sep = lines[0].includes(';') ? ';' : ',';
  const headers = lines[0].split(sep).map(h => h.trim().toLowerCase().replace(/['"]/g, ''));
  return lines.slice(1).map(line => {
    const cols = line.split(sep);
    return headers.reduce((acc, h, i) => {
      acc[h] = (cols[i] || "").trim().replace(/^["']|["']$/g, '');
      return acc;
    }, {});
  }).filter(r => Object.values(r).some(v => v));
};

const upsideClass = (u) => {
  if (u === null) return "";
  if (u >= 0.20) return "upside-high";
  if (u >= 0.10) return "upside-med";
  if (u >= 0) return "upside-low";
  return "upside-neg";
};

const qClass = (q) => ["q0","q1","q2","q3","q4"][q] || "q0";

function SortTh({ label, field, sort, onSort, right, center }) {
  const active = sort.field === field;
  return (
    <th className={right ? "right" : center ? "center" : ""}>
      <button className={`sort-btn${active ? " active" : ""}`} onClick={() => onSort(field)}>
        {label} <span className="sort-arrow">{active ? (sort.dir === "asc" ? "↑" : "↓") : "↕"}</span>
      </button>
    </th>
  );
}

function UploadPage({ raw, onFile, onRun }) {
  const files = [
    { key: "hc", label: "HC Data", title: "High Conviction", desc: "ISIN, Company Name, Region, Sector, Price, Target, Forward P/E, Upside/Downside" },
    { key: "quant", label: "Quant", title: "Quantitative", desc: "ISIN, Combined Quartile, Stop Loss Signal, Short Term Technical" },
    { key: "qual", label: "Qualitative", title: "Fundamental", desc: "ISIN, Overall Rating, Moat, Management Quality" },
  ];
  const canRun = raw.hc && raw.quant;
  return (
    <div className="upload-page">
      <p style={{fontSize:9,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:"var(--accent-dark)",marginBottom:8}}>Mirabaud HC Lab</p>
      <h2 className="upload-title">Investment Universe<br />Screening Tool</h2>
      <p className="upload-subtitle">Macro → Micro · 3 Bloomberg CSV files</p>
      <div className="upload-grid">
        {files.map(f => (
          <div key={f.key} className={`upload-card${raw[f.key] ? " loaded" : ""}`}>
            <div className="upload-card-label">{f.label}</div>
            <div className="upload-card-title">{f.title}</div>
            <div className="upload-card-desc">{f.desc}</div>
            <div className={`upload-card-status ${raw[f.key] ? "status-ok" : "status-pending"}`}>
              {raw[f.key] ? `✓ ${raw[f.key].length} rows loaded` : "— Pending"}
            </div>
            <label className="file-input-label">
              {raw[f.key] ? "Replace" : "Upload CSV"}
              <input type="file" accept=".csv,.txt" className="file-input" onChange={(e) => onFile(f.key, e)} />
            </label>
          </div>
        ))}
      </div>
      <button className="run-btn" disabled={!canRun} onClick={onRun}>
        {canRun ? "→ Run Fusion & Screen" : "Upload HC + Quant to continue"}
      </button>
      {!raw.qual && raw.hc && <p style={{marginTop:12,fontSize:9,color:"var(--muted)"}}>Qualitative file optional — richer scoring if provided.</p>}
    </div>
  );
}

function MacroDashboard({ enriched, onDrillSector }) {
  const regions = useMemo(() => {
    const map = {};
    enriched.forEach(s => {
      if (!map[s.region]) map[s.region] = { count: 0, upside: 0, highRisk: 0 };
      map[s.region].count++;
      map[s.region].upside += (s.upside || 0);
      if (s.risk === "high") map[s.region].highRisk++;
    });
    return Object.entries(map).map(([name, d]) => ({
      name, count: d.count, highRisk: d.highRisk,
      avgUpside: d.count ? (d.upside / d.count) : null
    })).sort((a, b) => b.count - a.count);
  }, [enriched]);

  const sectors = useMemo(() => {
    const map = {};
    enriched.forEach(s => {
      if (!map[s.sector]) map[s.sector] = { count: 0, upside: 0, highRisk: 0, q1: 0 };
      map[s.sector].count++;
      map[s.sector].upside += (s.upside || 0);
      if (s.risk === "high") map[s.sector].highRisk++;
      if (s.qRank === 1) map[s.sector].q1++;
    });
    return Object.entries(map).map(([name, d]) => ({
      name, count: d.count, highRisk: d.highRisk, q1: d.q1,
      avgUpside: d.count ? (d.upside / d.count) : null
    })).sort((a, b) => b.count - a.count);
  }, [enriched]);

  const maxCount = Math.max(...sectors.map(s => s.count), 1);
  const maxHR = Math.max(...sectors.map(s => s.highRisk), 1);

  const total = enriched.length;
  const highRisk = enriched.filter(s => s.risk === "high").length;
  const medRisk = enriched.filter(s => s.risk === "medium").length;
  const lowRisk = enriched.filter(s => s.risk === "low").length;
  const q1Count = enriched.filter(s => s.qRank === 1).length;
  const avgUpside = enriched.length ? (enriched.reduce((a, s) => a + (s.upside || 0), 0) / enriched.length * 100).toFixed(1) : "—";
  const avgUpsideNum = parseFloat(avgUpside);

  return (
    <div className="dashboard">
      {/* KPI Row */}
      <div className="kpi-row">
        <div className="kpi-card">
          <div className="kpi-label">Universe</div>
          <div className="kpi-value">{total}</div>
          <div className="kpi-sub">Securities</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-label">Avg Upside</div>
          <div className={`kpi-value ${avgUpsideNum > 0 ? "green" : "red"}`}>{avgUpside}%</div>
          <div className="kpi-sub">Consensus</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-label">Q1 Quant</div>
          <div className="kpi-value green">{q1Count}</div>
          <div className="kpi-sub">{total ? ((q1Count/total)*100).toFixed(0) : 0}% of universe</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-label">High Risk</div>
          <div className="kpi-value red">{highRisk}</div>
          <div className="kpi-sub">{total ? ((highRisk/total)*100).toFixed(0) : 0}% of universe</div>
        </div>
        <div className="kpi-card">
          <div className="kpi-label">Sectors</div>
          <div className="kpi-value gold">{sectors.length}</div>
          <div className="kpi-sub">{regions.length} regions</div>
        </div>
      </div>

      {/* Mid Row */}
      <div className="section-grid">
        {/* Regions */}
        <div className="panel">
          <div className="panel-header"><span className="panel-title">By Region</span><span style={{fontSize:9,color:"var(--muted)"}}>Avg Upside →</span></div>
          <div className="panel-body">
            {regions.map(r => (
              <div key={r.name} className="region-row">
                <div>
                  <div className="region-name">{r.name}</div>
                  <div className="region-count">{r.count} securities · {r.highRisk} high risk</div>
                </div>
                <div className={`region-upside ${r.avgUpside > 0 ? "pos" : "neg"}`}>
                  {r.avgUpside !== null ? `${(r.avgUpside * 100).toFixed(1)}%` : "—"}
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Risk Breakdown */}
        <div className="panel">
          <div className="panel-header"><span className="panel-title">Risk Overview</span></div>
          <div className="panel-body">
            <div style={{marginBottom:20}}>
              {[
                { label: "High Risk", count: highRisk, color: "var(--red)", cls: "red" },
                { label: "Medium Risk", count: medRisk, color: "var(--accent)", cls: "accent" },
                { label: "Low / Clean", count: lowRisk, color: "var(--green)", cls: "green" },
              ].map(r => (
                <div key={r.label} className="bar-row">
                  <span className="bar-name">{r.label}</span>
                  <div className="bar-track">
                    <div className={`bar-fill ${r.cls}`} style={{width: `${total ? (r.count/total*100) : 0}%`}} />
                  </div>
                  <span className="bar-meta">{r.count} <span style={{color:"var(--muted)"}}>{total ? `(${(r.count/total*100).toFixed(0)}%)` : ""}</span></span>
                </div>
              ))}
            </div>
            <div style={{borderTop:"1px solid var(--border)",paddingTop:16}}>
              <p className="panel-title" style={{marginBottom:12}}>Quant Distribution</p>
              {[1,2,3,4].map(q => {
                const cnt = enriched.filter(s => s.qRank === q).length;
                return (
                  <div key={q} className="bar-row">
                    <span className="bar-name"><span className={`q-badge q${q}`}>Q{q}</span></span>
                    <div className="bar-track">
                      <div className={`bar-fill ${q===1?"green":q===4?"red":"accent"}`} style={{width:`${total?(cnt/total*100):0}%`}} />
                    </div>
                    <span className="bar-meta">{cnt}</span>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>

      {/* Sectors */}
      <div className="panel">
        <div className="panel-header">
          <span className="panel-title">By Sector — click to drill down</span>
          <span style={{fontSize:9,color:"var(--muted)"}}>Count · High Risk · Avg Upside</span>
        </div>
        <div className="panel-body">
          {sectors.map(s => (
            <div key={s.name} className="bar-row" style={{cursor:"pointer",padding:"2px 0"}} onClick={() => onDrillSector(s.name)}>
              <span className="bar-name" style={{fontWeight:700,fontSize:11}}>{s.name}</span>
              <div className="bar-track">
                <div className="bar-fill" style={{width:`${(s.count/maxCount*100)}%`}} />
              </div>
              <span className="bar-meta" style={{width:80}}>
                {s.count} · <span style={{color:"var(--red)"}}>{s.highRisk}⚑</span>
              </span>
              <span style={{fontSize:10,fontWeight:700,width:50,textAlign:"right",color:s.avgUpside>0?"var(--green)":"var(--red)"}}>
                {s.avgUpside !== null ? `${(s.avgUpside*100).toFixed(1)}%` : "—"}
              </span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function UniverseTable({ enriched, onSelect }) {
  const [search, setSearch] = useState("");
  const [region, setRegion] = useState("All");
  const [sector, setSector] = useState("All");
  const [quants, setQuants] = useState([]);
  const [risk, setRisk] = useState("All");
  const [sort, setSort] = useState({ field: "upside", dir: "desc" });

  const regions = useMemo(() => ["All", ...Array.from(new Set(enriched.map(s => s.region))).sort()], [enriched]);
  const sectors = useMemo(() => ["All", ...Array.from(new Set(enriched.map(s => s.sector))).sort()], [enriched]);

  const toggleQ = (q) => setQuants(prev => prev.includes(q) ? prev.filter(x => x !== q) : [...prev, q]);

  const handleSort = (field) => {
    setSort(prev => prev.field === field ? { field, dir: prev.dir === "asc" ? "desc" : "asc" } : { field, dir: "desc" });
  };

  const filtered = useMemo(() => {
    let data = enriched;
    if (search) {
      const q = search.toLowerCase();
      data = data.filter(s => s.name.toLowerCase().includes(q) || (s.id_isin || "").toLowerCase().includes(q));
    }
    if (region !== "All") data = data.filter(s => s.region === region);
    if (sector !== "All") data = data.filter(s => s.sector === sector);
    if (quants.length > 0) data = data.filter(s => quants.includes(s.qRank));
    if (risk !== "All") data = data.filter(s => s.risk === risk);

    data = [...data].sort((a, b) => {
      const dir = sort.dir === "asc" ? 1 : -1;
      if (sort.field === "name") return dir * a.name.localeCompare(b.name);
      if (sort.field === "upside") return dir * ((a.upside ?? -999) - (b.upside ?? -999));
      if (sort.field === "qRank") return dir * ((a.qRank || 9) - (b.qRank || 9));
      if (sort.field === "pe") return dir * ((cN(a.pe) ?? 9999) - (cN(b.pe) ?? 9999));
      return 0;
    });
    return data;
  }, [enriched, search, region, sector, quants, risk, sort]);

  return (
    <div>
      <div className="filters-bar">
        <input className="search-input" placeholder="Search ISIN / Name…" value={search} onChange={e => setSearch(e.target.value)} />
        <div className="filter-divider" />
        <div className="filter-group">
          <span className="filter-label">Region</span>
          <select className="filter-select" value={region} onChange={e => setRegion(e.target.value)}>
            {regions.map(r => <option key={r}>{r}</option>)}
          </select>
        </div>
        <div className="filter-group">
          <span className="filter-label">Sector</span>
          <select className="filter-select" value={sector} onChange={e => setSector(e.target.value)}>
            {sectors.map(s => <option key={s}>{s}</option>)}
          </select>
        </div>
        <div className="filter-divider" />
        <div className="filter-group">
          <span className="filter-label">Quant Q</span>
          <div className="filter-chips">
            {[1,2,3,4].map(q => (
              <button key={q} className={`chip q${q}${quants.includes(q) ? " active" : ""}`} onClick={() => toggleQ(q)}>Q{q}</button>
            ))}
          </div>
        </div>
        <div className="filter-divider" />
        <div className="filter-group">
          <span className="filter-label">Risk</span>
          <div className="filter-chips">
            {["All","low","medium","high"].map(r => (
              <button key={r} className={`chip${risk===r?" active":""}`} onClick={() => setRisk(r)}>{r === "All" ? "All" : r.charAt(0).toUpperCase()+r.slice(1)}</button>
            ))}
          </div>
        </div>
        <span className="results-count">{filtered.length} / {enriched.length} securities</span>
      </div>

      <div className="table-wrap">
        {filtered.length === 0 ? (
          <div className="empty"><div className="empty-icon">∅</div><div className="empty-msg">No securities match current filters</div></div>
        ) : (
          <table className="universe-table">
            <thead>
              <tr>
                <SortTh label="Security" field="name" sort={sort} onSort={handleSort} />
                <th><span className="sort-btn">Region</span></th>
                <th><span className="sort-btn">Sector</span></th>
                <SortTh label="Quant Q" field="qRank" sort={sort} onSort={handleSort} center />
                <SortTh label="Upside %" field="upside" sort={sort} onSort={handleSort} right />
                <SortTh label="Fwd P/E" field="pe" sort={sort} onSort={handleSort} right />
                <th>Risk</th>
                <th>Flags</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map((s, i) => (
                <tr key={i} onClick={() => onSelect(s)}>
                  <td>
                    <div className="td-name">{s.name}</div>
                    <div className="td-isin">{s.id_isin}</div>
                  </td>
                  <td><span className="td-region">{s.region}</span></td>
                  <td><span className="td-sector">{s.sector}</span></td>
                  <td style={{textAlign:"center"}}>
                    <span className={`q-badge ${qClass(s.qRank)}`}>{s.qRank ? `Q${s.qRank}` : "—"}</span>
                  </td>
                  <td style={{textAlign:"right"}}>
                    <span className={`upside-val ${upsideClass(s.upside)}`}>
                      {s.upside !== null ? `${(s.upside * 100).toFixed(1)}%` : "—"}
                    </span>
                  </td>
                  <td style={{textAlign:"right",fontWeight:700,fontSize:11}}>
                    {cN(s.pe) ? `${parseFloat(s.pe).toFixed(1)}x` : "—"}
                  </td>
                  <td><span className={`risk-badge risk-${s.risk}`}>{s.risk}</span></td>
                  <td>
                    <div className="flag-list">
                      {s.flags.map((f, fi) => (
                        <span key={fi} className={`flag${f.includes("Stop") ? " red" : ""}`}>{f}</span>
                      ))}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

function DetailModal({ s, onClose }) {
  if (!s) return null;
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-panel" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <button className="modal-close" onClick={onClose}>✕ Close</button>
          <div className="modal-region-tag">{s.region} · {s.sector}</div>
          <div className="modal-name">{s.name}</div>
          <div className="modal-isin">{s.id_isin}</div>
        </div>
        <div className="modal-body">
          {/* Pricing */}
          <div className="modal-section">
            <div className="modal-section-title">Pricing & Consensus</div>
            <div className="modal-metrics">
              <div className="modal-metric">
                <div className="modal-metric-label">Last Price</div>
                <div className="modal-metric-val">{s.price || "—"}</div>
              </div>
              <div className="modal-metric">
                <div className="modal-metric-label">Target Price</div>
                <div className="modal-metric-val gold">{s.target || "—"}</div>
              </div>
              <div className="modal-metric">
                <div className="modal-metric-label">Upside / Downside</div>
                <div className={`modal-metric-val ${s.upside > 0 ? "green" : "red"}`}>
                  {s.upside !== null ? `${(s.upside*100).toFixed(1)}%` : "—"}
                </div>
              </div>
              <div className="modal-metric">
                <div className="modal-metric-label">Forward P/E</div>
                <div className="modal-metric-val">{cN(s.pe) ? `${parseFloat(s.pe).toFixed(1)}x` : "—"}</div>
              </div>
            </div>
          </div>
          {/* Quant */}
          <div className="modal-section">
            <div className="modal-section-title">Quantitative</div>
            <div className="qual-row">
              <span className="qual-key">Combined Quartile</span>
              <span className={`q-badge ${qClass(s.qRank)}`}>{s.qRank ? `Q${s.qRank}` : "—"}</span>
            </div>
            <div className="qual-row">
              <span className="qual-key">Stop Loss Signal</span>
              <span className={`qual-val${s.stopLoss?.toUpperCase().includes("STOP") ? " " : ""}`} style={{color: s.stopLoss?.toUpperCase().includes("STOP") ? "var(--red)" : "inherit"}}>{s.stopLoss || "—"}</span>
            </div>
            <div className="qual-row">
              <span className="qual-key">ST Technical</span>
              <span className="qual-val">{s.tech || "—"}</span>
            </div>
          </div>
          {/* Qualitative */}
          {(s.overall || s.moat || s.mgmt) && (
            <div className="modal-section">
              <div className="modal-section-title">Qualitative</div>
              {s.overall && <div className="qual-row"><span className="qual-key">Overall Rating</span><span className="qual-val">{s.overall}</span></div>}
              {s.moat && <div className="qual-row"><span className="qual-key">Moat</span><span className="qual-val">{s.moat}</span></div>}
              {s.mgmt && <div className="qual-row"><span className="qual-key">Management Quality</span><span className="qual-val">{s.mgmt}</span></div>}
            </div>
          )}
          {/* Risk & Flags */}
          <div className="modal-section">
            <div className="modal-section-title">Risk Audit</div>
            <div className="qual-row">
              <span className="qual-key">Risk Level</span>
              <span className={`risk-badge risk-${s.risk}`}>{s.risk}</span>
            </div>
            {s.flags.length > 0 && (
              <div style={{marginTop:12}}>
                <div className="flags-section">
                  {s.flags.map((f, i) => (
                    <span key={i} className={`flag-large${f.includes("Low") ? " warn" : ""}`}>{f}</span>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [raw, setRaw] = useState({ hc: null, quant: null, qual: null });
  const [enriched, setEnriched] = useState([]);
  const [selected, setSelected] = useState(null);
  const [view, setView] = useState("upload");
  const [drillSector, setDrillSector] = useState(null);

  const handleFile = (key, e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (f) => {
      const json = parseCSV(f.target.result);
      setRaw(prev => ({ ...prev, [key]: json }));
    };
    reader.readAsText(file);
  };

  const runFusion = () => {
    if (!raw.hc || !raw.quant) return;
    const merged = raw.hc.map(s => {
      const isin = String(s.id_isin || s.isin || "").toLowerCase().trim();
      const q = raw.quant.find(x => String(x.id_isin || x.isin || "").toLowerCase().trim() === isin) || {};
      const l = raw.qual?.find(x => String(x.id_isin || x.isin || "").toLowerCase().trim() === isin) || {};

      const upside = cN(s["upside downside"] || s["upside/downside"] || s["upside"] || s["upside (%)"] || null);
      const qRank = parseInt(q["combined quartile"] || q["quartile"] || q["quant quartile"] || 0) || 0;

      const flags = [];
      if (upside !== null && upside < THR.LOW_UPSIDE) flags.push("Low Upside");
      if (qRank >= THR.Q_WARN) flags.push("Quant Q4");
      const stopSignal = q["stop loss signal"] || q["stop loss"] || "";
      if (stopSignal.toLowerCase().includes("stop")) flags.push("Stop Loss");
      const pe = cN(s["forward pe"] || s["forward p/e"] || s["fwd pe"] || null);
      if (pe && pe > THR.STRETCHED_PE) flags.push("Stretched P/E");

      return {
        id_isin: s.id_isin || s.isin,
        name: s["company name"] || s["company"] || s["name"] || "N/A",
        region: mapRegion(s["region"] || s["geography"] || ""),
        sector: s["sector name"] || s["sector"] || s["gics sector"] || "Other",
        upside, qRank, pe: s["forward pe"] || s["forward p/e"] || s["fwd pe"],
        price: s["last price"] || s["price"],
        target: s["price target (1)"] || s["price target"] || s["target price"],
        stopLoss: stopSignal,
        tech: q["short term technical"] || q["technical"] || "",
        overall: l["overall rating"] || l["overall"] || "",
        moat: l["moat"] || "",
        mgmt: l["management quality"] || l["management"] || "",
        flags,
        risk: flags.length >= 2 ? "high" : flags.length === 1 ? "medium" : "low"
      };
    });
    setEnriched(merged);
    setView("macro");
  };

  const handleDrillSector = (sector) => {
    setDrillSector(sector);
    setView("screen");
  };

  return (
    <div id="root" style={{display:"flex",flexDirection:"column",height:"100vh"}}>
      <header className="header">
        <div className="header-brand">
          <h1>Mirabaud</h1>
          <span>HC Lab</span>
        </div>
        {enriched.length > 0 && (
          <nav className="header-nav">
            <button className={`nav-btn${view==="macro"?" active":""}`} onClick={() => setView("macro")}>Macro View</button>
            <button className={`nav-btn${view==="screen"?" active":""}`} onClick={() => { setDrillSector(null); setView("screen"); }}>Universe Screen</button>
            <button className={`nav-btn`} onClick={() => { setEnriched([]); setRaw({hc:null,quant:null,qual:null}); setView("upload"); }} style={{color:"var(--muted)"}}>↺ Reset</button>
          </nav>
        )}
      </header>

      <div className="main">
        {view === "upload" && <UploadPage raw={raw} onFile={handleFile} onRun={runFusion} />}
        {view === "macro" && <MacroDashboard enriched={enriched} onDrillSector={handleDrillSector} />}
        {view === "screen" && (
          <UniverseTable
            enriched={drillSector ? enriched.filter(s => s.sector === drillSector) : enriched}
            onSelect={setSelected}
          />
        )}
      </div>

      {selected && <DetailModal s={selected} onClose={() => setSelected(null)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
