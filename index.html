<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mirabaud HC | Final Fusion</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Helper to normalize names (The "Matching Brain")
        function norm(n) {
            if (!n) return "";
            return String(n).toLowerCase().replace(/[^a-z0-9]/g, "").trim();
        }

        function App() {
            const [data, setData] = useState({ stocks: null, quant: null, qual: null });
            const [final, setFinal] = useState(null);
            const [error, setError] = useState("");

            const handleFile = (key, e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (f) => {
                    const text = f.target.result;
                    const rows = text.split(/\r?\n/).filter(l => l.trim());
                    const sep = rows[0].includes(';') ? ';' : ',';
                    const headers = rows[0].split(sep).map(h => h.trim().toLowerCase());
                    const json = rows.slice(1).map(row => {
                        const cols = row.split(sep);
                        return headers.reduce((acc, h, i) => {
                            acc[h] = cols[i]?.trim();
                            return acc;
                        }, {});
                    });
                    setData(prev => ({ ...prev, [key]: json }));
                };
                reader.readAsText(file);
            };

            const runMerge = () => {
                try {
                    // This logic looks for a column named 'name' or 'ticker' or 'company'
                    const merged = data.stocks.map(s => {
                        const id = norm(s.name || s.ticker || s.company);
                        const q = data.quant.find(item => norm(item.name || item.ticker) === id) || {};
                        const l = data.qual.find(item => norm(item.name || item.ticker) === id) || {};
                        return { ...s, ...q, ...l };
                    });
                    setFinal(merged);
                    setError("");
                } catch (err) {
                    setError("Merge Failed: Check if your CSV headers include 'name' or 'ticker'.");
                }
            };

            return (
                <div className="p-10 max-w-5xl mx-auto font-sans">
                    <h1 className="text-2xl font-bold text-[#0f2d5e] mb-6 underline decoration-orange-500">MIRABAUD HC FUSION ENGINE</h1>
                    
                    {/* Step 1: Uploaders */}
                    <div className="grid grid-cols-3 gap-4 mb-8">
                        {['stocks', 'quant', 'qual'].map(k => (
                            <div key={k} className={`p-4 border-2 rounded-lg ${data[k] ? 'bg-green-50 border-green-500' : 'bg-white border-dashed border-slate-300'}`}>
                                <p className="text-[10px] font-bold uppercase mb-2 text-slate-400">{k} File</p>
                                <input type="file" onChange={(e) => handleFile(k, e)} className="text-[10px] w-full cursor-pointer" />
                                {data[k] && <p className="text-[10px] text-green-600 font-bold mt-1">✓ {data[k].length} rows</p>}
                            </div>
                        ))}
                    </div>

                    {/* Step 2: The Merge Button */}
                    {data.stocks && data.quant && data.qual && !final && (
                        <button 
                            onClick={runMerge}
                            className="w-full bg-orange-600 text-white py-4 rounded-xl font-black text-lg shadow-lg hover:bg-orange-700 transition-all active:scale-95"
                        >
                            PROCESS & MERGE DATA NOW
                        </button>
                    )}

                    {error && <p className="text-red-600 font-bold mt-4">⚠️ {error}</p>}

                    {/* Step 3: Result Table */}
                    {final && (
                        <div className="mt-8 bg-white rounded-xl shadow-xl overflow-hidden animate-in slide-in-from-bottom-5 duration-700">
                            <div className="bg-[#0f2d5e] text-white p-4 font-bold flex justify-between uppercase text-xs">
                                <span>Consolidated Results</span>
                                <span>{final.length} Securities</span>
                            </div>
                            <table className="w-full text-left text-sm">
                                <thead className="bg-slate-50 border-b">
                                    <tr>
                                        <th className="p-4">Stock Name</th>
                                        <th className="p-4 text-center">Merged Data Check</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {final.slice(0, 10).map((row, i) => (
                                        <tr key={i} className="border-b hover:bg-blue-50">
                                            <td className="p-4 font-bold uppercase text-slate-700">{row.name || row.ticker}</td>
                                            <td className="p-4 text-center text-xs text-slate-400 italic">Successfully linked across 3 files</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                            {final.length > 10 && <p className="p-4 text-center text-xs text-slate-400 italic">Showing first 10 of {final.length} stocks...</p>}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
