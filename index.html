<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mirabaud HC | Analyst Suite v4.2</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f4f7fa] text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // ── Institutional Constants & Thresholds ──
        const SECTOR_COLORS = {
            "Information Technology": "#3E7ACC", "Health Care": "#E05A5A",
            "Financials": "#7B68EE", "Consumer Discretionary": "#E88C3C",
            "Industrials": "#4DBBBB", "Communication Services": "#4A90D9"
        };

        const THR = {
            LOW_UPSIDE: 0.10, 
            STRETCHED_PE: 35, 
            QUANT_WARN: 4, // Quartile 4
            QUAL_WARN: 2.2
        };

        // ── Functional Helpers ──
        const nrm = (v) => String(v || "").trim().toLowerCase();
        const cN = (v) => {
            if (!v) return null;
            const n = parseFloat(String(v).replace(/[€$£%\s,]/g, ""));
            return isNaN(n) ? null : n;
        };

        function App() {
            const [raw, setRaw] = useState({ hc: null, quant: null, qual: null });
            const [enriched, setEnriched] = useState([]);
            const [selected, setSelected] = useState(null);
            const [view, setView] = useState("upload"); // upload, dashboard, table

            // ── CSV Parsing Logic ──
            const handleFile = (key, e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (f) => {
                    const lines = f.target.result.split(/\r?\n/).filter(l => l.trim());
                    const sep = lines[0].includes(';') ? ';' : ',';
                    const headers = lines[0].split(sep).map(h => nrm(h));
                    const json = lines.slice(1).map(line => {
                        const cols = line.split(sep);
                        return headers.reduce((acc, h, i) => {
                            acc[h] = cols[i]?.trim();
                            return acc;
                        }, {});
                    });
                    setRaw(prev => ({ ...prev, [key]: json }));
                };
                reader.readAsText(file);
            };

            // ── The "Fusion" Engine ──
            const runFusion = () => {
                const merged = raw.hc.map(s => {
                    const isin = nrm(s.id_isin || s.isin);
                    const q = raw.quant.find(x => nrm(x.id_isin || x.isin) === isin) || {};
                    const l = raw.qual.find(x => nrm(x.id_isin || x.isin) === isin) || {};

                    // Calculate Forensic Flags
                    const flags = [];
                    const upside = cN(s.upside || s.upside_downside);
                    const pe = cN(s.fwd_pe || s.pe);
                    const qRank = parseInt(q.valuation_rank || q.combined_quartile);

                    if (upside !== null && upside < THR.LOW_UPSIDE) flags.push("Low Upside (<10%)");
                    if (pe > THR.STRETCHED_PE) flags.push("Stretched Valuation");
                    if (qRank >= THR.QUANT_WARN) flags.push("Quant Q4 (Sell Signal)");
                    if (!l.moat_score) flags.push("No Qual Review");

                    return {
                        ...s,
                        name: s.name || s.company,
                        sector: s.sector || "Unassigned",
                        region: s.region || "Other",
                        upside: upside,
                        qRank: qRank,
                        flags: flags,
                        risk: flags.length > 2 ? "high" : flags.length > 0 ? "medium" : "low"
                    };
                });
                setEnriched(merged);
                setView("dashboard");
            };

            // ── Dashboard Aggregates ──
            const stats = useMemo(() => {
                if (!enriched.length) return null;
                return {
                    total: enriched.length,
                    highRisk: enriched.filter(x => x.risk === "high").length,
                    q1: enriched.filter(x => x.qRank === 1).length,
                    regions: enriched.reduce((acc, x) => {
                        const r = x.region.includes("US") ? "North America" : x.region.includes("Europe") ? "Europe" : "Emerging Markets";
                        acc[r] = (acc[r] || 0) + 1;
                        return acc;
                    }, {})
                };
            }, [enriched]);

            return (
                <div className="flex flex-col h-screen">
                    {/* Mirabaud Header */}
                    <header className="bg-[#0f2d5e] text-white p-5 flex justify-between items-center shadow-2xl shrink-0">
                        <div>
                            <h1 className="font-black italic text-xl tracking-tighter">MIRABAUD <span className="font-light opacity-50 ml-1 uppercase text-sm">HC Intelligence</span></h1>
                        </div>
                        {enriched.length > 0 && (
                            <div className="flex gap-4">
                                <button onClick={() => setView("dashboard")} className={`text-[10px] font-bold uppercase tracking-widest ${view==='dashboard'?'text-orange-400':''}`}>Overview</button>
                                <button onClick={() => setView("table")} className={`text-[10px] font-bold uppercase tracking-widest ${view==='table'?'text-orange-400':''}`}>Security List</button>
                            </div>
                        )}
                    </header>

                    <main className="flex-1 overflow-auto p-8">
                        {view === "upload" ? (
                            <div className="max-w-xl mx-auto space-y-4 pt-10">
                                <h2 className="text-center text-slate-400 font-bold uppercase text-[10px] tracking-[0.3em] mb-10">Data Integration Portal</h2>
                                {['hc', 'quant', 'qual'].map(k => (
                                    <div key={k} className={`p-6 border-2 rounded-2xl transition ${raw[k] ? 'bg-white border-green-500 shadow-md' : 'bg-slate-100 border-dashed border-slate-300'}`}>
                                        <p className="text-[10px] font-black uppercase text-slate-500 mb-2">{k} file</p>
                                        <input type="file" onChange={(e) => handleFile(k, e)} className="text-[10px] w-full cursor-pointer" />
                                    </div>
                                ))}
                                {raw.hc && raw.quant && raw.qual && (
                                    <button onClick={runFusion} className="w-full bg-[#0f2d5e] text-white py-4 rounded-2xl font-black hover:bg-orange-600 transition shadow-xl mt-6 uppercase tracking-widest">Initialise Analysis</button>
                                )}
                            </div>
                        ) : view === "dashboard" ? (
                            <div className="max-w-6xl mx-auto animate-in fade-in duration-500">
                                {/* Institutional KPI Row */}
                                <div className="grid grid-cols-4 gap-6 mb-10">
                                    <KpiCard label="Universe" value={stats.total} color="bg-slate-800" />
                                    <KpiCard label="Review Required" value={stats.highRisk} color="bg-red-600" />
                                    <KpiCard label="Quant Leaders (Q1)" value={stats.q1} color="bg-emerald-600" />
                                    <KpiCard label="Active PTs" value={enriched.filter(x => x.upside).length} color="bg-blue-600" />
                                </div>

                                {/* Regional Breakdown Section */}
                                <div className="grid grid-cols-3 gap-8">
                                    {Object.entries(stats.regions).map(([name, count]) => (
                                        <div key={name} className="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 flex flex-col items-center">
                                            <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">{name}</span>
                                            <span className="text-5xl font-black text-[#0f2d5e]">{count}</span>
                                            <button onClick={() => setView("table")} className="mt-6 text-[10px] font-bold text-blue-600 hover:underline uppercase">View Stocks →</button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="max-w-7xl mx-auto bg-white rounded-2xl shadow-2xl border overflow-hidden">
                                <table className="w-full text-left text-xs">
                                    <thead className="bg-slate-50 border-b font-black text-slate-400 uppercase text-[9px] tracking-widest">
                                        <tr>
                                            <th className="p-4">Security</th>
                                            <th className="p-4">Upside</th>
                                            <th className="p-4">Quant</th>
                                            <th className="p-4">Risk Status</th>
                                            <th className="p-4">Forensic Flags</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {enriched.map((s, i) => (
                                            <tr key={i} onClick={() => setSelected(s)} className="border-b hover:bg-blue-50 cursor-pointer transition">
                                                <td className="p-4">
                                                    <div className="font-black text-slate-800 uppercase">{s.name}</div>
                                                    <div className="text-[10px] text-slate-400 font-mono">{s.id_isin}</div>
                                                </td>
                                                <td className={`p-4 font-bold ${s.upside > 0.15 ? 'text-green-600' : 'text-slate-400'}`}>
                                                    {(s.upside * 100).toFixed(1)}%
                                                </td>
                                                <td className="p-4 font-mono font-black text-blue-600">Q{s.qRank || '—'}</td>
                                                <td className="p-4">
                                                    <Badge level={s.risk} />
                                                </td>
                                                <td className="p-4">
                                                    <div className="flex flex-wrap gap-1">
                                                        {s.flags.map((f, fi) => (
                                                            <span key={fi} className="bg-red-50 text-[9px] text-red-600 px-2 py-0.5 rounded font-bold border border-red-100 uppercase">{f}</span>
                                                        ))}
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>

                    {/* Side Detail Panel (Mirroring provided code logic) */}
                    {selected && (
                        <div className="fixed right-0 top-0 h-full w-[450px] bg-white shadow-[-20px_0_50px_rgba(0,0,0,0.1)] p-10 border-l animate-in slide-in-from-right duration-300 z-50 overflow-y-auto">
                            <button onClick={() => setSelected(null)} className="text-[10px] font-bold text-slate-400 mb-10 hover:text-red-500 uppercase">✕ Close Analyst View</button>
                            <h2 className="text-3xl font-black text-[#0f2d5e] uppercase tracking-tighter leading-none mb-2">{selected.name}</h2>
                            <p className="font-mono text-xs text-slate-400 border-b pb-6 mb-8">{selected.id_isin} • {selected.sector}</p>
                            
                            <div className="space-y-8">
                                <section>
                                    <h3 className="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-4">Quant Metrics</h3>
                                    <div className="grid grid-cols-2 gap-4">
                                        <MetricBox label="Valuation Rank" value={`Q${selected.qRank}`} />
                                        <MetricBox label="Upside" value={`${(selected.upside*100).toFixed(1)}%`} />
                                    </div>
                                </section>

                                <section>
                                    <h3 className="text-[10px] font-black text-red-600 uppercase tracking-widest mb-4">Forensic Risk Audit</h3>
                                    <div className="space-y-2">
                                        {selected.flags.length > 0 ? selected.flags.map((f, i) => (
                                            <div key={i} className="flex items-center gap-3 bg-red-50 p-3 rounded-lg border border-red-100">
                                                <div className="w-1.5 h-1.5 bg-red-500 rounded-full"></div>
                                                <span className="text-xs font-bold text-red-700 uppercase">{f}</span>
                                            </div>
                                        )) : (
                                            <p className="text-xs text-emerald-600 font-bold italic">No critical risk flags identified.</p>
                                        )}
                                    </div>
                                </section>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const KpiCard = ({ label, value, color }) => (
            <div className={`${color} p-6 rounded-3xl text-white shadow-lg`}>
                <p className="text-[9px] font-black uppercase opacity-60 tracking-widest mb-1">{label}</p>
                <p className="text-3xl font-black">{value}</p>
            </div>
        );

        const Badge = ({ level }) => {
            const styles = {
                high: "bg-red-100 text-red-700 border-red-200",
                medium: "bg-orange-100 text-orange-700 border-orange-200",
                low: "bg-emerald-100 text-emerald-700 border-emerald-200"
            };
            const labels = { high: "Review Required", medium: "On Watch", low: "Intact" };
            return <span className={`${styles[level]} px-3 py-1 rounded-full text-[10px] font-black uppercase border`}>{labels[level]}</span>;
        };

        const MetricBox = ({ label, value }) => (
            <div className="bg-slate-50 p-4 rounded-2xl border">
                <p className="text-[9px] font-black text-slate-400 uppercase mb-1">{label}</p>
                <p className="text-lg font-black text-slate-800">{value}</p>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
