<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mirabaud | Analyst Workspace</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f8fafc] text-slate-900 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        function App() {
            const [data, setData] = useState({ stocks: null, quant: null, qual: null });
            const [mergedData, setMergedData] = useState(null);
            const [selectedStock, setSelectedStock] = useState(null);
            const [searchTerm, setSearchTerm] = useState("");

            const handleFile = (key, e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (f) => {
                    const text = f.target.result;
                    const rows = text.split(/\r?\n/).filter(l => l.trim());
                    const sep = rows[0].includes(';') ? ';' : ',';
                    const headers = rows[0].split(sep).map(h => h.trim().toLowerCase());
                    const json = rows.slice(1).map(row => {
                        const cols = row.split(sep);
                        return headers.reduce((acc, h, i) => {
                            acc[h] = cols[i]?.trim();
                            return acc;
                        }, {});
                    });
                    setData(prev => ({ ...prev, [key]: json }));
                };
                reader.readAsText(file);
            };

            const runFusion = () => {
                const result = data.stocks.map(s => {
                    const isin = String(s.id_isin || "").trim().toLowerCase();
                    const qMatch = data.quant.find(q => String(q.id_isin || "").trim().toLowerCase() === isin) || {};
                    const lMatch = data.qual.find(l => String(l.id_isin || "").trim().toLowerCase() === isin) || {};
                    
                    const current = parseFloat(s.last_price || 0);
                    const target = parseFloat(s.target_price || 0);
                    const upside = target > 0 ? ((target - current) / current * 100).toFixed(1) : "0.0";

                    return { ...s, ...qMatch, ...lMatch, upside };
                });
                setMergedData(result);
            };

            const filteredResults = useMemo(() => {
                if (!mergedData) return [];
                return mergedData.filter(item => 
                    (item.name || "").toLowerCase().includes(searchTerm.toLowerCase()) || 
                    (item.id_isin || "").toLowerCase().includes(searchTerm.toLowerCase())
                );
            }, [mergedData, searchTerm]);

            return (
                <div className="flex h-screen w-screen overflow-hidden">
                    {/* LEFT: MAIN SCREENER */}
                    <div className="flex-1 flex flex-col min-w-0 bg-white">
                        <header className="bg-[#0f2d5e] p-4 text-white flex justify-between items-center shrink-0">
                            <h1 className="font-black italic text-lg tracking-tighter uppercase">Mirabaud <span className="font-light opacity-50">Screener</span></h1>
                            <div className="flex gap-4">
                                {!mergedData && data.stocks && data.quant && data.qual && (
                                    <button onClick={runFusion} className="bg-orange-500 hover:bg-orange-600 px-4 py-1.5 rounded text-xs font-bold transition shadow-lg animate-pulse">START FUSION</button>
                                )}
                            </div>
                        </header>

                        {!mergedData ? (
                            <div className="p-12 grid grid-cols-1 gap-6 max-w-md mx-auto mt-20">
                                {['stocks', 'quant', 'qual'].map(k => (
                                    <div key={k} className={`p-6 border-2 rounded-xl text-center ${data[k] ? 'bg-green-50 border-green-500' : 'bg-slate-50 border-dashed border-slate-300'}`}>
                                        <p className="text-[10px] font-black text-slate-400 uppercase mb-2">Upload {k} CSV</p>
                                        <input type="file" onChange={(e) => handleFile(k, e)} className="text-[10px] w-full cursor-pointer" />
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="flex-1 flex flex-col overflow-hidden">
                                <div className="p-4 border-b bg-slate-50 flex gap-4 shrink-0">
                                    <input 
                                        type="text" 
                                        placeholder="Search by ISIN or Name..." 
                                        className="flex-1 p-2 border rounded-lg text-sm bg-white shadow-inner focus:ring-2 focus:ring-blue-500 outline-none"
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                </div>
                                <div className="flex-1 overflow-auto">
                                    <table className="w-full text-xs text-left border-collapse">
                                        <thead className="bg-slate-100 sticky top-0 z-10 border-b">
                                            <tr className="text-slate-500 font-bold uppercase tracking-widest text-[10px]">
                                                <th className="p-4">Security</th>
                                                <th className="p-4">Sector</th>
                                                <th className="p-4 text-center bg-blue-50 text-blue-600">Quant Rank</th>
                                                <th className="p-4 text-center bg-orange-50 text-orange-600">Qual Score</th>
                                                <th className="p-4 text-right">Upside</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {filteredResults.map((row, i) => (
                                                <tr 
                                                    key={i} 
                                                    onClick={() => setSelectedStock(row)}
                                                    className={`border-b hover:bg-blue-50 cursor-pointer transition ${selectedStock?.id_isin === row.id_isin ? 'bg-blue-100/50' : ''}`}
                                                >
                                                    <td className="p-4">
                                                        <div className="font-bold text-slate-900">{row.name}</div>
                                                        <div className="text-[10px] text-slate-400 font-mono">{row.id_isin}</div>
                                                    </td>
                                                    <td className="p-4 text-slate-500">{row.sector}</td>
                                                    <td className="p-4 text-center font-black text-blue-700 bg-blue-50/20">{row.valuation_rank || "—"}</td>
                                                    <td className="p-4 text-center font-black text-orange-700 bg-orange-50/20 italic">{row.moat_score || "—"}</td>
                                                    <td className={`p-4 text-right font-black ${parseFloat(row.upside) > 15 ? 'text-green-600' : 'text-slate-400'}`}>{row.upside}%</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* RIGHT: STOCK FACTSHEET */}
                    <div className={`transition-all duration-500 border-l border-slate-200 bg-white flex flex-col ${selectedStock ? 'w-[450px]' : 'w-0 overflow-hidden'}`}>
                        {selectedStock && (
                            <div className="flex-1 flex flex-col p-8 overflow-y-auto">
                                <button onClick={() => setSelectedStock(null)} className="text-[10px] font-black text-slate-400 hover:text-red-500 mb-6 uppercase tracking-widest">✕ Close Factsheet</button>
                                
                                <header className="mb-8">
                                    <h2 className="text-3xl font-black text-slate-900 leading-none mb-1 uppercase tracking-tighter">{selectedStock.name}</h2>
                                    <p className="text-xs text-blue-600 font-mono font-bold tracking-widest">{selectedStock.id_isin} • {selectedStock.sector}</p>
                                </header>

                                <div className="grid grid-cols-2 gap-4 mb-8">
                                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                        <p className="text-[9px] font-black text-slate-400 uppercase mb-1">Region</p>
                                        <p className="font-bold text-slate-800">{selectedStock.region || "Global"}</p>
                                    </div>
                                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                        <p className="text-[9px] font-black text-slate-400 uppercase mb-1">Upside to Target</p>
                                        <p className={`font-black text-lg ${parseFloat(selectedStock.upside) > 0 ? 'text-green-600' : 'text-red-500'}`}>{selectedStock.upside}%</p>
                                    </div>
                                </div>

                                <section className="mb-8 p-6 bg-blue-50/50 rounded-2xl border border-blue-100">
                                    <h3 className="text-[10px] font-black text-blue-600 uppercase mb-4 tracking-[0.2em]">Quantitative Breakdown</h3>
                                    <div className="space-y-4">
                                        <ScoreRow label="Valuation Rank" value={selectedStock.valuation_rank} />
                                        <ScoreRow label="Momentum Rank" value={selectedStock.momentum_rank} />
                                        <ScoreRow label="Quality Rank" value={selectedStock.quality_rank} />
                                    </div>
                                </section>

                                <section className="p-6 bg-orange-50/50 rounded-2xl border border-orange-100">
                                    <h3 className="text-[10px] font-black text-orange-600 uppercase mb-4 tracking-[0.2em]">Qualitative Insights</h3>
                                    <div className="space-y-4">
                                        <ScoreRow label="Economic Moat" value={selectedStock.moat_score} />
                                        <ScoreRow label="Management Quality" value={selectedStock.mgmt_score} />
                                        <ScoreRow label="ESG Profile" value={selectedStock.esg_rank} />
                                    </div>
                                </section>
                                
                                <div className="mt-auto pt-8 text-[9px] text-slate-300 uppercase font-bold text-center italic tracking-widest">
                                    Mirabaud Proprietary Research Engine v4.2
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const ScoreRow = ({ label, value }) => (
            <div className="flex justify-between items-center border-b border-white/50 pb-2">
                <span className="text-xs text-slate-500 font-medium">{label}</span>
                <span className="text-sm font-black text-slate-800">{value || "—"}</span>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
