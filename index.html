<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mirabaud HC | Executive Terminal</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f4f7fa] text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const THR = { LOW_UPSIDE: 0.10, STRETCHED_PE: 35, Q_WARN: 4 };

        const cN = (v) => {
            if (!v || v === "—" || v === "-" || v === "#N/A") return null;
            const n = parseFloat(String(v).replace(/[€$£%\s,]/g, ""));
            return isNaN(n) ? null : n;
        };

        const mapRegion = (r) => {
            const val = String(r || "").toUpperCase();
            if (val.includes("US") || val.includes("NORTH AMERICA") || val.includes("USA") || val.includes("CANADA")) return "North America";
            if (val.includes("EUROPE") || val.includes("UK") || val.includes("CH") || val.includes("FR") || val.includes("EU") || val.includes("GERMANY")) return "Europe";
            return "Emerging Markets";
        };

        function App() {
            const [raw, setRaw] = useState({ hc: null, quant: null, qual: null });
            const [enriched, setEnriched] = useState([]);
            const [selected, setSelected] = useState(null);
            const [view, setView] = useState("upload");
            const [search, setSearch] = useState("");

            const handleFile = (key, e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (f) => {
                    const lines = f.target.result.split(/\r?\n/).filter(l => l.trim());
                    const sep = lines[0].includes(';') ? ';' : ',';
                    const headers = lines[0].split(sep).map(h => h.trim().toLowerCase());
                    const json = lines.slice(1).map(line => {
                        const cols = line.split(sep);
                        return headers.reduce((acc, h, i) => {
                            acc[h] = cols[i]?.trim();
                            return acc;
                        }, {});
                    });
                    setRaw(prev => ({ ...prev, [key]: json }));
                };
                reader.readAsText(file);
            };

            const runFusion = () => {
                if (!raw.hc || !raw.quant) return;
                const merged = raw.hc.map(s => {
                    const isin = String(s.id_isin || "").toLowerCase();
                    const q = raw.quant.find(x => String(x.id_isin || "").toLowerCase() === isin) || {};
                    const l = raw.qual?.find(x => String(x.id_isin || "").toLowerCase() === isin) || {};

                    const upside = cN(s["upside downside"]);
                    const qRank = parseInt(q["combined quartile"] || 0);
                    
                    const flags = [];
                    if (upside !== null && upside < THR.LOW_UPSIDE) flags.push("Low Upside");
                    if (qRank >= THR.Q_WARN) flags.push("Quant Q4");
                    if (q["stop loss signal"]?.toLowerCase().includes("stop")) flags.push("Stop Loss");

                    return {
                        id_isin: s.id_isin,
                        name: s["company name"] || s["company"] || "N/A",
                        region: mapRegion(s["region"]),
                        sector: s["sector name"] || "Other",
                        upside, qRank,
                        price: s["last price"], target: s["price target (1)"], pe: s["forward pe"],
                        stopLoss: q["stop loss signal"], tech: q["short term technical"],
                        overall: l["overall rating"], moat: l["moat"], mgmt: l["management quality"],
                        flags, risk: flags.length >= 2 ? "high" : flags.length > 0 ? "medium" : "low"
                    };
                });
                setEnriched(merged);
                setView("dashboard");
            };

            const sectorHeat = useMemo(() => {
                const map = enriched.reduce((acc, x) => {
                    if (!acc[x.sector]) acc[x.sector] = { count: 0, highRisk: 0, avgUpside: 0 };
                    acc[x.sector].count++;
                    if (x.risk === "high") acc[x.sector].highRisk++;
                    acc[x.sector].avgUpside += (x.upside || 0);
                    return acc;
                }, {});
                return Object.entries(map).map(([name, d]) => ({
                    name, ...d, avgUpside: (d.avgUpside / d.count * 100).toFixed(1)
                })).sort((a, b) => b.highRisk - a.highRisk);
            }, [enriched]);

            const exportMaster = () => {
                const head = "ISIN,Name,Region,Sector,Upside,QuantRank,RiskLevel\n";
                const body = enriched.map(s => `${s.id_isin},${s.name},${s.region},${s.sector},${s.upside},${s.qRank},${s.risk}`).join("\n");
                const blob = new Blob([head + body], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'Mirabaud_Master_Research.csv'; a.click();
            };

            return (
                <div className="flex flex-col h-screen overflow-hidden">
                    <header className="bg-[#0f172a] text-white p-6 flex justify-between items-center shadow-2xl shrink-0">
                        <h1 className="font-black italic text-2xl tracking-tighter">MIRABAUD <span className="font-thin opacity-50 uppercase text-lg">HC Hub</span></h1>
                        {enriched.length > 0 && (
                            <div className="flex items-center gap-10">
                                <input type="text" placeholder="Filter ISIN/Name..." className="bg-white/10 border border-white/20 rounded-xl px-4 py-2 text-xs w-64 focus:bg-white/20 outline-none" onChange={e => setSearch(e.target.value)} />
                                <nav className="flex gap-8 text-[10px] font-black uppercase tracking-widest">
                                    <button onClick={() => setView("dashboard")} className={view==="dashboard"?"text-orange-400":""}>Dashboard</button>
                                    <button onClick={() => setView("table")} className={view==="table"?"text-orange-400":""}>Universe</button>
                                    <button onClick={exportMaster} className="bg-orange-600 px-4 py-2 rounded-lg hover:bg-white hover:text-orange-600 transition shadow-xl">Export CSV</button>
                                </nav>
                            </div>
                        )}
                    </header>

                    <main className="flex-1 overflow-auto p-12 bg-slate-100">
                        {view === "upload" ? (
                            <div className="max-w-md mx-auto space-y-4 pt-20 animate-in fade-in zoom-in">
                                <h2 className="text-center font-black text-slate-400 uppercase tracking-widest text-xs mb-10">Data Connector</h2>
                                {['hc', 'quant', 'qual'].map(k => (
                                    <div key={k} className="relative p-6 bg-white border-2 border-dashed border-slate-200 rounded-[32px] hover:border-blue-500 transition-all">
                                        <p className="text-[10px] font-black uppercase text-slate-400 mb-1">{k.toUpperCase()} SOURCE</p>
                                        <p className="text-xs font-bold text-slate-600">{raw[k] ? "✓ File Ready" : "Select CSV..."}</p>
                                        <input type="file" onChange={e => handleFile(k, e)} className="absolute inset-0 opacity-0 cursor-pointer" />
                                    </div>
                                ))}
                                {raw.hc && raw.quant && raw.qual && (
                                    <button onClick={runFusion} className="w-full bg-[#0f172a] text-white py-6 rounded-[32px] font-black hover:bg-orange-600 transition-all shadow-2xl text-xs tracking-widest">INITIATE ENGINE</button>
                                )}
                            </div>
                        ) : view === "dashboard" ? (
                            <div className="max-w-6xl mx-auto space-y-12 animate-in fade-in duration-500">
                                <div className="grid grid-cols-3 gap-8">
                                    {Object.entries(enriched.reduce((acc, x) => { acc[x.region] = (acc[x.region] || 0) + 1; return acc; }, { "North America": 0, "Europe": 0, "Emerging Markets": 0 })).map(([r, c]) => (
                                        <div key={r} className="bg-white p-12 rounded-[48px] shadow-sm border border-slate-100 text-center">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-4">{r}</p>
                                            <p className="text-7xl font-black text-[#0f172a]">{c}</p>
                                        </div>
                                    ))}
                                </div>

                                {/* SECTOR RISK HEATMAP */}
                                <div className="bg-white p-10 rounded-[48px] shadow-sm border border-slate-100">
                                    <h3 className="text-xs font-black text-slate-400 uppercase tracking-[0.2em] mb-8">Sector Risk Concentration</h3>
                                    <div className="grid grid-cols-2 gap-10">
                                        {sectorHeat.map(s => (
                                            <div key={s.name} className="flex items-center justify-between p-6 bg-slate-50 rounded-3xl border border-slate-100">
                                                <div>
                                                    <p className="text-xs font-black text-[#0f172a] uppercase">{s.name}</p>
                                                    <p className="text-[10px] font-bold text-slate-400">{s.count} Holdings • {s.avgUpside}% Avg. Upside</p>
                                                </div>
                                                <div className="flex flex-col items-end">
                                                    <span className={`text-[10px] font-black px-3 py-1 rounded-full uppercase ${s.highRisk > 0 ? 'bg-red-100 text-red-600' : 'bg-emerald-100 text-emerald-600'}`}>
                                                        {s.highRisk} High Risk
                                                    </span>
                                                    <div className="w-32 h-1.5 bg-slate-200 rounded-full mt-3 overflow-hidden">
                                                        <div className="h-full bg-red-500 transition-all" style={{ width: `${(s.highRisk/s.count)*100}%` }}></div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="bg-white rounded-[40px] shadow-2xl border overflow-hidden">
                                <table className="w-full text-left text-xs">
                                    <thead className="bg-slate-50 border-b font-black text-slate-400 text-[10px] tracking-widest uppercase">
                                        <tr><th className="p-6">Security</th><th className="p-6">Region</th><th className="p-6 text-center">Upside</th><th className="p-6 text-center">Quant</th><th className="p-6">Status</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {enriched.filter(x => x.name.toLowerCase().includes(search.toLowerCase())).map((s, i) => (
                                            <tr key={i} onClick={() => setSelected(s)} className="hover:bg-blue-50/50 cursor-pointer transition-all">
                                                <td className="p-6 font-black text-slate-800 uppercase">{s.name}<p className="text-[9px] font-mono text-slate-400">{s.id_isin}</p></td>
                                                <td className="p-6 font-bold text-slate-400 uppercase text-[10px]">{s.region}</td>
                                                <td className="p-6 text-center font-black text-slate-500">{s.upside ? `${(s.upside*100).toFixed(1)}%` : "—"}</td>
                                                <td className="p-6 text-center font-black font-mono text-blue-600">Q{s.qRank || "—"}</td>
                                                <td className="p-6"><span className={`px-3 py-1 rounded-full text-[9px] font-black uppercase ${s.risk==='high'?'bg-red-600 text-white':'bg-emerald-500 text-white'}`}>{s.risk==='high'?'Review':'Intact'}</span></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>

                    {selected && (
                        <div className="fixed inset-0 bg-[#0f172a]/80 backdrop-blur-md z-50 flex justify-end">
                            <div className="w-[600px] bg-white h-full p-16 animate-in slide-in-from-right duration-500 overflow-y-auto">
                                <button onClick={() => setSelected(null)} className="text-[10px] font-black text-slate-300 hover:text-red-500 uppercase mb-12">✕ Close</button>
                                <h2 className="text-5xl font-black text-[#0f172a] uppercase tracking-tighter leading-none mb-4">{selected.name}</h2>
                                <p className="text-sm font-bold text-slate-400 tracking-widest uppercase mb-10 border-b pb-4">{selected.id_isin} | {selected.sector}</p>
                                
                                <div className="space-y-12">
                                    <section className="grid grid-cols-2 gap-8">
                                        <Card label="Upside" val={selected.upside ? `${(selected.upside*100).toFixed(1)}%` : "N/A"} />
                                        <Card label="Quant Quartile" val={`Q${selected.qRank}`} />
                                        <Card label="Stop Loss" val={selected.stopLoss || "Neutral"} highlight={selected.stopLoss?.includes('STOP')} />
                                        <Card label="Qual Rating" val={selected.overall || "Pending"} />
                                    </section>
                                    <section className="bg-slate-50 p-10 rounded-[48px] border border-slate-100">
                                        <h3 className="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-6">Internal Forensic Analysis</h3>
                                        <div className="space-y-4">
                                            {selected.flags.map(f => (
                                                <div key={f} className="flex items-center gap-3 text-red-600 font-black uppercase text-[10px] bg-white p-4 rounded-2xl border border-red-50 shadow-sm">
                                                    <div className="w-2 h-2 bg-red-600 rounded-full animate-pulse"></div>{f}
                                                </div>
                                            ))}
                                            {selected.flags.length === 0 && <p className="text-xs font-bold text-emerald-600 uppercase italic">Security is compliant with all internal HC benchmarks.</p>}
                                        </div>
                                    </section>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const Card = ({ label, val, highlight }) => (
            <div className={`p-6 rounded-3xl border border-slate-100 ${highlight ? 'bg-red-50 border-red-100' : 'bg-white'}`}>
                <p className="text-[9px] font-black text-slate-300 uppercase mb-1">{label}</p>
                <p className={`text-xl font-black ${highlight ? 'text-red-600' : 'text-[#0f172a]'}`}>{val}</p>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
