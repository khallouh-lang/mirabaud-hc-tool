<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mirabaud HC | Institutional Terminal</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f8fafc] text-slate-900 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const THR = { LOW_UPSIDE: 0.10, STRETCHED_PE: 35, Q_WARN: 4 };

        const cN = (v) => {
            if (!v || v === "—" || v === "-" || v === "#N/A") return null;
            const n = parseFloat(String(v).replace(/[€$£%\s,]/g, ""));
            return isNaN(n) ? null : n;
        };

        const mapRegion = (r) => {
            const val = String(r || "").toUpperCase();
            if (val.includes("US") || val.includes("NORTH AMERICA") || val.includes("USA") || val.includes("CANADA")) return "North America";
            if (val.includes("EUROPE") || val.includes("UK") || val.includes("CH") || val.includes("FR") || val.includes("EU") || val.includes("GERMANY")) return "Europe";
            return "Emerging Markets";
        };

        function App() {
            const [raw, setRaw] = useState({ hc: null, quant: null, qual: null });
            const [enriched, setEnriched] = useState([]);
            const [selected, setSelected] = useState(null);
            const [activeSector, setActiveSector] = useState(null);
            const [view, setView] = useState("upload");
            const [search, setSearch] = useState("");

            const handleFile = (key, e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (f) => {
                    const lines = f.target.result.split(/\r?\n/).filter(l => l.trim());
                    const sep = lines[0].includes(';') ? ';' : ',';
                    const headers = lines[0].split(sep).map(h => h.trim().toLowerCase());
                    const json = lines.slice(1).map(line => {
                        const cols = line.split(sep);
                        return headers.reduce((acc, h, i) => {
                            acc[h] = cols[i]?.trim();
                            return acc;
                        }, {});
                    });
                    setRaw(prev => ({ ...prev, [key]: json }));
                };
                reader.readAsText(file);
            };

            const runFusion = () => {
                if (!raw.hc || !raw.quant) return;
                const merged = raw.hc.map(s => {
                    const isin = String(s.id_isin || "").toLowerCase();
                    const q = raw.quant.find(x => String(x.id_isin || "").toLowerCase() === isin) || {};
                    const l = raw.qual?.find(x => String(x.id_isin || "").toLowerCase() === isin) || {};

                    const upside = cN(s["upside downside"]);
                    const qRank = parseInt(q["combined quartile"] || 0);
                    
                    const flags = [];
                    if (upside !== null && upside < THR.LOW_UPSIDE) flags.push("Low Upside");
                    if (qRank >= THR.Q_WARN) flags.push("Quant Q4");
                    if (q["stop loss signal"]?.toLowerCase().includes("stop")) flags.push("Stop Loss");

                    return {
                        id_isin: s.id_isin,
                        name: s["company name"] || s["company"] || "N/A",
                        region: mapRegion(s["region"]),
                        sector: s["sector name"] || "Other",
                        upside, qRank,
                        price: s["last price"], target: s["price target (1)"], pe: s["forward pe"],
                        stopLoss: q["stop loss signal"], tech: q["short term technical"],
                        overall: l["overall rating"], moat: l["moat"], mgmt: l["management quality"],
                        flags, risk: flags.length >= 2 ? "high" : flags.length > 0 ? "medium" : "low"
                    };
                });
                setEnriched(merged);
                setView("dashboard");
            };

            const sectorSummary = useMemo(() => {
                const map = enriched.reduce((acc, x) => {
                    if (!acc[x.sector]) acc[x.sector] = { count: 0, highRisk: 0, avgUpside: 0 };
                    acc[x.sector].count++;
                    if (x.risk === "high") acc[x.sector].highRisk++;
                    acc[x.sector].avgUpside += (x.upside || 0);
                    return acc;
                }, {});
                return Object.entries(map).map(([name, d]) => ({
                    name, ...d, avgUpside: (d.avgUpside / d.count * 100).toFixed(1)
                })).sort((a, b) => b.highRisk - a.highRisk);
            }, [enriched]);

            const drillDownStocks = useMemo(() => {
                return enriched.filter(s => s.sector === activeSector);
            }, [enriched, activeSector]);

            return (
                <div className="flex flex-col h-screen overflow-hidden">
                    <header className="bg-[#0f172a] text-white p-6 flex justify-between items-center shrink-0 shadow-2xl z-20">
                        <h1 className="font-black italic text-xl tracking-tighter uppercase">MIRABAUD <span className="font-thin opacity-50">HC LAB</span></h1>
                        {enriched.length > 0 && (
                            <nav className="flex items-center gap-10 text-[10px] font-black uppercase tracking-widest">
                                <button onClick={() => setView("dashboard")} className={view==="dashboard"?"text-orange-400":""}>Market Dashboard</button>
                                <button onClick={() => setView("table")} className={view==="table"?"text-orange-400":""}>Universe Table</button>
                            </nav>
                        )}
                    </header>

                    <main className="flex-1 overflow-auto p-12 bg-slate-50">
                        {view === "upload" ? (
                            <div className="max-w-md mx-auto space-y-4 pt-10 animate-in fade-in">
                                {['hc', 'quant', 'qual'].map(k => (
                                    <div key={k} className="p-8 bg-white border-2 border-dashed rounded-[32px] relative text-center hover:border-blue-500 transition-all">
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">{k.toUpperCase()} DATA</p>
                                        <p className="text-sm font-bold text-slate-700">{raw[k] ? "✓ Loaded" : "Upload CSV"}</p>
                                        <input type="file" onChange={e => handleFile(k, e)} className="absolute inset-0 opacity-0 cursor-pointer" />
                                    </div>
                                ))}
                                {raw.hc && raw.quant && raw.qual && (
                                    <button onClick={runFusion} className="w-full bg-[#0f172a] text-white py-6 rounded-[32px] font-black text-xs tracking-[0.2em] shadow-2xl">LAUNCH TERMINAL</button>
                                )}
                            </div>
                        ) : view === "dashboard" ? (
                            <div className="max-w-7xl mx-auto space-y-12">
                                {/* SECTOR HEATMAP GRID */}
                                <section>
                                    <h2 className="text-xs font-black text-slate-400 uppercase tracking-[0.4em] mb-8 text-center">Sector Risk Concentration • Click to Drill Down</h2>
                                    <div className="grid grid-cols-4 gap-6">
                                        {sectorSummary.map(s => (
                                            <div 
                                                key={s.name} 
                                                onClick={() => setActiveSector(s.name)}
                                                className={`cursor-pointer p-8 rounded-[40px] border transition-all transform hover:scale-105 ${activeSector === s.name ? 'bg-[#0f172a] text-white border-transparent shadow-2xl' : 'bg-white text-slate-900 border-slate-100 shadow-sm'}`}
                                            >
                                                <p className={`text-[9px] font-black uppercase tracking-widest mb-2 ${activeSector === s.name ? 'text-orange-400' : 'text-slate-400'}`}>{s.name}</p>
                                                <div className="flex justify-between items-baseline mb-4">
                                                    <span className="text-4xl font-black">{s.count}</span>
                                                    <span className="text-[10px] font-bold opacity-60 uppercase">{s.avgUpside}% Upside</span>
                                                </div>
                                                <div className="w-full h-1 bg-slate-200/20 rounded-full overflow-hidden">
                                                    <div className="h-full bg-red-500" style={{ width: `${(s.highRisk/s.count)*100}%` }}></div>
                                                </div>
                                                <p className="text-[9px] font-black uppercase mt-3 opacity-60">{s.highRisk} Risk Warnings</p>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                {/* DRILL DOWN TABLE */}
                                {activeSector && (
                                    <section className="bg-white rounded-[48px] shadow-2xl border border-slate-100 overflow-hidden animate-in slide-in-from-bottom-10 duration-500">
                                        <div className="p-8 border-b flex justify-between items-center bg-slate-50/50">
                                            <h3 className="font-black text-[#0f172a] uppercase tracking-tighter text-2xl">Underlying: {activeSector}</h3>
                                            <button onClick={() => setActiveSector(null)} className="text-[10px] font-black text-slate-400 hover:text-red-500 uppercase tracking-widest">✕ Close Drill-down</button>
                                        </div>
                                        <table className="w-full text-left text-xs">
                                            <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b">
                                                <tr>
                                                    <th className="p-6">Security</th>
                                                    <th className="p-6 text-center">Quant Q</th>
                                                    <th className="p-6 text-center">Consensus Target</th>
                                                    <th className="p-6 text-center">Upside %</th>
                                                    <th className="p-6">Risk Audit</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {drillDownStocks.map((s, i) => (
                                                    <tr key={i} onClick={() => setSelected(s)} className="hover:bg-blue-50/50 cursor-pointer transition-colors group">
                                                        <td className="p-6">
                                                            <div className="font-black text-[#0f172a] uppercase group-hover:text-blue-600 transition-colors">{s.name}</div>
                                                            <div className="text-[9px] font-mono text-slate-400 mt-1 uppercase tracking-widest">{s.id_isin}</div>
                                                        </td>
                                                        <td className="p-6 text-center">
                                                            <span className={`px-4 py-1.5 rounded-xl font-black font-mono text-sm ${s.qRank === 1 ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500'}`}>Q{s.qRank || "—"}</span>
                                                        </td>
                                                        <td className="p-6 text-center font-bold text-slate-600">{s.target || "N/A"}</td>
                                                        <td className={`p-6 text-center font-black ${s.upside > 0.15 ? 'text-emerald-600' : 'text-slate-400'}`}>
                                                            {s.upside ? `${(s.upside * 100).toFixed(1)}%` : "—"}
                                                        </td>
                                                        <td className="p-6">
                                                            <div className={`inline-flex items-center gap-2 px-3 py-1 rounded-full text-[9px] font-black uppercase ${s.risk==='high'?'bg-red-500 text-white shadow-lg shadow-red-200':'bg-emerald-500 text-white shadow-lg shadow-emerald-200'}`}>
                                                                {s.risk==='high'?'Review':'Clean'}
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </section>
                                )}
                            </div>
                        ) : (
                            /* FULL UNIVERSE VIEW (RETAINED FROM PREVIOUS) */
                            <div className="max-w-7xl mx-auto bg-white rounded-[40px] shadow-2xl overflow-hidden animate-in fade-in">
                                <div className="p-8 border-b bg-slate-50/50 flex justify-between items-center">
                                    <h3 className="font-black text-[#0f172a] uppercase tracking-tighter text-2xl">Full Research Universe</h3>
                                    <input type="text" placeholder="Search ISIN/Name..." className="bg-white border rounded-full px-6 py-2 text-xs w-80 shadow-sm" onChange={e => setSearch(e.target.value)} />
                                </div>
                                <table className="w-full text-left text-xs">
                                    <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b">
                                        <tr><th className="p-6">Security</th><th className="p-6 text-center">Quant Rank</th><th className="p-6 text-center">Upside</th><th className="p-6">Status</th></tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {enriched.filter(x => x.name.toLowerCase().includes(search.toLowerCase())).map((s, i) => (
                                            <tr key={i} onClick={() => setSelected(s)} className="hover:bg-slate-50 cursor-pointer">
                                                <td className="p-6 font-black text-slate-800 uppercase">{s.name}</td>
                                                <td className="p-6 text-center font-black text-blue-600 font-mono">Q{s.qRank}</td>
                                                <td className="p-6 text-center font-black">{s.upside ? `${(s.upside*100).toFixed(1)}%` : "—"}</td>
                                                <td className="p-6"><span className={`px-3 py-1 rounded-full text-[9px] font-black uppercase ${s.risk==='high'?'bg-red-600 text-white':'bg-emerald-500 text-white'}`}>{s.risk==='high'?'Review':'Intact'}</span></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>

                    {/* DETAIL MODAL (SIDEBAR) */}
                    {selected && (
                        <div className="fixed inset-0 bg-[#0f172a]/70 backdrop-blur-md z-50 flex justify-end transition-all">
                            <div className="w-[600px] bg-white h-full p-16 animate-in slide-in-from-right duration-500 overflow-y-auto">
                                <button onClick={() => setSelected(null)} className="text-[10px] font-black text-slate-300 hover:text-red-500 uppercase mb-12 tracking-[0.2em]">✕ Close Profile</button>
                                <div className="mb-14">
                                    <span className="bg-blue-600 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase mb-4 inline-block tracking-widest">{selected.region}</span>
                                    <h2 className="text-5xl font-black text-[#0f172a] uppercase tracking-tighter leading-none mb-3">{selected.name}</h2>
                                    <p className="text-xs font-bold text-slate-400 tracking-widest uppercase">{selected.id_isin} • {selected.sector}</p>
                                </div>
                                <div className="space-y-10">
                                    <div className="grid grid-cols-2 gap-6 bg-slate-50 p-8 rounded-[40px] border border-slate-100">
                                        <div className="col-span-2 border-b pb-4 mb-2"><h4 className="text-[10px] font-black text-slate-300 uppercase tracking-widest">Pricing & Rank</h4></div>
                                        <Metric label="Last Price" val={selected.price} />
                                        <Metric label="Target Price" val={selected.target} highlight />
                                        <Metric label="Quant Quartile" val={`Q${selected.qRank}`} />
                                        <Metric label="Forward P/E" val={selected.pe} />
                                    </div>
                                    <div className="p-8 border border-slate-100 rounded-[40px]">
                                        <h4 className="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-6">Qualitative Audit</h4>
                                        <div className="space-y-4">
                                            <QualLine label="Moat" val={selected.moat} />
                                            <QualLine label="Management" val={selected.mgmt} />
                                            <QualLine label="Stop Loss Signal" val={selected.stopLoss} color={selected.stopLoss?.includes('STOP') ? 'text-red-600' : 'text-slate-900'} />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const Metric = ({ label, val, highlight }) => (
            <div>
                <p className="text-[9px] font-black text-slate-400 uppercase tracking-tighter mb-1">{label}</p>
                <p className={`text-xl font-black ${highlight ? 'text-blue-600' : 'text-[#0f172a]'}`}>{val || "—"}</p>
            </div>
        );

        const QualLine = ({ label, val, color="text-slate-900" }) => (
            <div className="flex justify-between items-center border-b border-slate-50 pb-2">
                <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">{label}</span>
                <span className={`text-[11px] font-bold uppercase ${color}`}>{val || "N/A"}</span>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
